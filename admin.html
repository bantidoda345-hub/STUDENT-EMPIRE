<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel - Students Empire</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body{ background:#f5f7fb; padding:15px; display: none; }
    .header{ background:#0d47a1; color:white; padding:15px; border-radius:12px; margin-bottom:15px; position:relative; }
    .sub-header { display: flex; align-items: center; background: #0d47a1; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; gap: 15px; }
    .card{ background:white; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    input,select{ width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; }
    button{ width:100%; padding:12px; background:#0d47a1; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    .page { display: none; }
    .page.active { display: block; }
    .list-item { background: #f8f9fa; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
</style>
</head>
<body>

<div id="mainDashboardPage" class="page active">
    <div class="header"><h2>Admin Panel</h2></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
        <div class="card" onclick="switchPage('notesPage')"><h4>College Notes</h4></div>
        <div class="card" onclick="switchPage('studyPage')"><h4>Comp. Study</h4></div>
    </div>
</div>

<!-- Notes Page -->
<div id="notesPage" class="page">
    <div class="sub-header"><button onclick="switchPage('mainDashboardPage')">Back</button><h2>Notes Manager</h2></div>
    <div class="card">
        <input type="text" id="notesFolderName" placeholder="New Folder Name">
        <button onclick="createNewFolder('notes')">Create Folder</button>
        <hr style="margin:15px 0;">
        <input type="text" id="notesTitle" placeholder="Title">
        <input type="text" id="notesUrl" placeholder="Direct Link (Optional)">
        <input type="file" id="notesFile">
        <select id="notesFolderSelect"><option value="">Select Folder</option></select>
        <button onclick="uploadMaterial('notes')">Upload to Notes</button>
    </div>
    <div id="notesFilesList"></div>
</div>

<!-- Study Page -->
<div id="studyPage" class="page">
    <div class="sub-header"><button onclick="switchPage('mainDashboardPage')">Back</button><h2>Study Manager</h2></div>
    <div class="card">
        <input type="text" id="studyFolderName" placeholder="New Folder Name">
        <button onclick="createNewFolder('study')">Create Folder</button>
        <hr style="margin:15px 0;">
        <input type="text" id="studyTitle" placeholder="Title">
        <input type="text" id="studyUrl" placeholder="Direct Link (Optional)">
        <input type="file" id="studyFile">
        <select id="studyFolderSelect"><option value="">Select Folder</option></select>
        <button onclick="uploadMaterial('study')">Upload to Study</button>
    </div>
    <div id="studyFilesList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
        authDomain: "student-empires.firebaseapp.com",
        projectId: "student-empires",
        storageBucket: "student-empires.firebasestorage.app",
        messagingSenderId: "509106125707",
        appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.switchPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.createNewFolder = async (type) => {
        const name = document.getElementById(type+'FolderName').value;
        if(!name) return;
        await addDoc(collection(db, "folders"), { name, type });
        alert("Folder Created!");
    };

    window.uploadMaterial = async (type) => {
        const title = document.getElementById(type+'Title').value;
        const urlInput = document.getElementById(type+'Url').value;
        const file = document.getElementById(type+'File').files[0];
        const folder = document.getElementById(type+'FolderSelect').value;

        let finalUrl = urlInput;
        if(file) {
            const storageRef = ref(storage, 'materials/'+Date.now()+file.name);
            const snap = await uploadBytes(storageRef, file);
            finalUrl = await getDownloadURL(snap.ref);
        }

        await addDoc(collection(db, "materials"), { title, url: finalUrl, folder, target: type });
        alert("Success!");
    };

    window.deleteItem = async (id) => {
        if(confirm("Delete?")) await deleteDoc(doc(db, "materials", id));
    };

    // Real-time Data
    onSnapshot(collection(db, "folders"), (snap) => {
        ['notes', 'study'].forEach(t => {
            const select = document.getElementById(t+'FolderSelect');
            select.innerHTML = '<option value="">Select Folder</option>';
            snap.forEach(d => { if(d.data().type == t) select.innerHTML += `<option>${d.data().name}</option>`; });
        });
    });

    onSnapshot(collection(db, "materials"), (snap) => {
        ['notes', 'study'].forEach(t => {
            const list = document.getElementById(t+'FilesList');
            list.innerHTML = '';
            snap.forEach(d => {
                if(d.data().target == t) {
                    list.innerHTML += `<div class='list-item'>${d.data().title} <i class='fa fa-trash' onclick="deleteItem('${d.id}')"></i></div>`;
                }
            });
        });
    });

    document.body.style.display = "block"; // Simplified auth for now
</script>
</body>
</html>
