<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
    input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #0d47a1; color: white; border: none; font-weight: bold; cursor: pointer; }
    #adminContent { display: none; }
</style>
</head>
<body>

<div id="pinScreen" class="card">
    <h3>Admin Login</h3>
    <input type="password" id="adminPin" placeholder="Enter PIN">
    <button onclick="checkPin()">Access Dashboard</button>
</div>

<div id="adminContent">
    <div class="card">
        <h3>Upload Study Material</h3>
        <input type="file" id="filePicker">
        <select id="folderSelect"><option value="PUNJAB POLICE">PUNJAB POLICE</option></select>
        <button id="uploadBtn" onclick="uploadNow()">Upload PDF</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({ apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE", authDomain: "student-empires.firebaseapp.com", projectId: "student-empires", appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e" });
    const db = getFirestore(app);
    
    // Supabase Client
    const supabase = window.supabase.createClient('https://ffnkqmqqspryqskattut.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbmtxbXFxc3ByeXFza2F0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDMwODEsImV4cCI6MjA5ODIxOTA4MX0.EXtgfJRX0EQM6YFdRp85hhf6QEnCnGClgSlb5INH1n4');

    window.checkPin = async () => {
        const pin = document.getElementById('adminPin').value;
        const snap = await getDocs(collection(db, "admin_config"));
        let valid = false;
        snap.forEach(d => { if(d.data().pin === pin) valid = true; });
        
        if(valid) {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { alert("Incorrect PIN!"); }
    };

    window.uploadNow = async () => {
        const fileInput = document.getElementById('filePicker');
        const file = fileInput.files[0];
        const btn = document.getElementById('uploadBtn');
        
        if(!file) return alert("Select a PDF file first!");
        
        btn.disabled = true;
        btn.innerText = "Uploading... Please wait";
        
        try {
            const { error } = await supabase.storage.from('materials').upload('study/' + Date.now() + '_' + file.name, file);
            if(error) throw error;
            alert("File Uploaded Successfully!");
            fileInput.value = "";
        } catch(e) {
            alert("Upload Failed: " + e.message + "\nCheck Supabase Storage Policies.");
        }
        btn.disabled = false;
        btn.innerText = "Upload PDF";
    };
</script>
</body>
</html>
