<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:15px;
padding-bottom:80px;
}

.header{
background:#0d47a1;
color:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.header h2{
margin-bottom:5px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#0d47a1;
color:white;
border:none;
border-radius:8px;
font-size:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.stat h2{
color:#0d47a1;
}

.folder{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.folder i{
color:#0d47a1;
}

</style>
</head>
<body>

<div class="header">
<h2>Admin Panel</h2>
<p>Students Empire Management</p>
</div>

<div class="stats">

<div class="stat">
<h2>0</h2>
<p>Total Users</p>
</div>

<div class="stat">
<h2>0</h2>
<p>Total Notes</p>
</div>

<div class="stat">
<h2>0</h2>
<p>Total PDFs</p>
</div>

<div class="stat">
<h2>0</h2>
<p>Total Groups</p>
</div>

</div>

<div class="card">

<h3>Create Folder</h3>

<input type="text" placeholder="Folder Name">

<button>Create Folder</button>

</div>

<div class="card">

<h3>Upload Notes PDF</h3>

<input type="text" placeholder="PDF Title">

<select>
<option>Select Folder</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Maths</option>
</select>

<input type="file">

<button>Upload PDF</button>

</div>

<div class="card">

<h3>Existing Folders</h3>

<div class="folder">
<span><i class="fa-solid fa-folder"></i> Physics</span>
<i class="fa-solid fa-trash"></i>
</div>

<div class="folder">
<span><i class="fa-solid fa-folder"></i> Chemistry</span>
<i class="fa-solid fa-trash"></i>
</div>

<div class="folder">
<span><i class="fa-solid fa-folder"></i> Maths</span>
<i class="fa-solid fa-trash"></i>
</div>

</div>

<div class="card">

<h3>Send Notification</h3>

<input type="text" placeholder="Notification Title">

<input type="text" placeholder="Message">

<button>Send To All Users</button>

</div>

</body>
</html>
