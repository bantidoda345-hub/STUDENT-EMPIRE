<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { font-family: sans-serif; background: #f5f7fb; margin: 0; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .popup { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 80%; max-width: 300px; text-align: center; }
    input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #0d47a1; color: white; border: none; font-weight: bold; cursor: pointer; }
    #adminContent { padding: 20px; display: none; }
</style>
</head>
<body>

<div id="overlay">
    <div class="popup">
        <h3>Admin Access</h3>
        <input type="password" id="adminPin" placeholder="Enter PIN">
        <button onclick="checkPin()">Login</button>
    </div>
</div>

<div id="adminContent">
    <div style="background: white; padding: 20px; border-radius: 12px;">
        <h3>Upload Material</h3>
        <input type="file" id="filePicker">
        <select id="folderSelect"><option>Select Folder</option></select>
        <button id="uploadBtn" onclick="uploadNow()">Upload PDF</button>
    </div>
</div>

<script>
    // Initialize Firebase (Compat version)
    const firebaseConfig = { apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE", authDomain: "student-empires.firebaseapp.com", projectId: "student-empires", storageBucket: "student-empires.firebasestorage.app", appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const supabase = supabase.createClient('https://ffnkqmqqspryqskattut.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbmtxbXFxc3ByeXFza2F0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDMwODEsImV4cCI6MjA5ODIxOTA4MX0.EXtgfJRX0EQM6YFdRp85hhf6QEnCnGClgSlb5INH1n4');

    async function checkPin() {
        const pin = document.getElementById('adminPin').value;
        const snapshot = await db.collection("admin_config").get();
        let match = false;
        snapshot.forEach(doc => { if(doc.data().pin == pin) match = true; });

        if(match) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadFolders();
        } else {
            alert("Wrong PIN!");
        }
    }

    function loadFolders() {
        db.collection("folders").onSnapshot(snap => {
            const sel = document.getElementById('folderSelect');
            sel.innerHTML = '<option>Select Folder</option>';
            snap.forEach(doc => {
                sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
            });
        });
    }

    async function uploadNow() {
        const file = document.getElementById('filePicker').files[0];
        const folder = document.getElementById('folderSelect').value;
        const btn = document.getElementById('uploadBtn');
        if(!file || folder === "Select Folder") return alert("Select File and Folder!");

        btn.innerText = "Uploading...";
        const { error } = await supabase.storage.from('materials').upload(`study/${Date.now()}_${file.name}`, file);
        if(!error) {
            const { data } = supabase.storage.from('materials').getPublicUrl(`study/${Date.now()}_${file.name}`);
            await db.collection("materials").add({ title: file.name, url: data.publicUrl, folder: folder });
            alert("Upload Success!");
        } else {
            alert("Error: " + error.message);
        }
        btn.innerText = "Upload PDF";
    }
</script>
</body>
</html>
