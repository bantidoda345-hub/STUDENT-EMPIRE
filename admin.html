<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel - Students Empire</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    *{margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif;}
    body{background:#f5f7fb; padding:15px; display: none;}
    .stats-card{background: #0d47a1; color: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between;}
    .card{background:white; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,.08);}
    input,select{width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;}
    button{width:100%; padding:12px; background:#0d47a1; color:white; border:none; border-radius:8px; font-weight: bold; cursor: pointer;}
    .list-item {background: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee;}
    .page {display: none;} .page.active {display: block;}
    .icon-group {display: flex; gap: 15px;}
    .delete-btn {color: #d32f2f; cursor: pointer;}
    .edit-btn {color: #1976d2; cursor: pointer;}
</style>
</head>
<body>

<div id="mainDashboardPage" class="page active">
    <div class="stats-card">
        <h3>Total Users: <span id="userCount">0</span></h3>
        <h3 onclick="switchPage('complaintsPage')" style="cursor:pointer; text-decoration:underline;">View Complaints</h3>
    </div>
    <div onclick="switchPage('notesPage')" class="card"><h4>Manage College Notes</h4></div>
    <div onclick="switchPage('studyPage')" class="card"><h4>Manage Study Materials</h4></div>
</div>

<div id="notesPage" class="page">
    <div class="card"><button onclick="switchPage('mainDashboardPage')">Back</button></div>
    <div class="card">
        <input type="text" id="notesFolderName" placeholder="Folder Name">
        <button onclick="createFolder('notes')">Create Folder</button>
        <hr style="margin:10px 0;">
        <input type="file" id="notesFilePicker" multiple>
        <select id="notesFolderSelect"></select>
        <button id="notesUploadBtn" onclick="uploadFiles('notes')">Upload PDFs</button>
    </div>
    <div id="notesFilesList"></div>
</div>

<div id="studyPage" class="page">
    <div class="card"><button onclick="switchPage('mainDashboardPage')">Back</button></div>
    <div class="card">
        <input type="text" id="studyFolderName" placeholder="Folder Name">
        <button onclick="createFolder('study')">Create Folder</button>
        <hr style="margin:10px 0;">
        <input type="file" id="studyFilePicker" multiple>
        <select id="studyFolderSelect"></select>
        <button id="studyUploadBtn" onclick="uploadFiles('study')">Upload PDFs</button>
    </div>
    <div id="studyFilesList"></div>
</div>

<div id="complaintsPage" class="page">
    <div class="card"><button onclick="switchPage('mainDashboardPage')">Back</button></div>
    <div id="complaintsContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({ apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE", authDomain: "student-empires.firebaseapp.com", projectId: "student-empires", appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e" });
const db = getFirestore(app); const auth = getAuth(app);
const supabase = window.supabase.createClient('https://ffnkqmqqspryqskattut.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbmtxbXFxc3ByeXFza2F0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDMwODEsImV4cCI6MjA5ODIxOTA4MX0.EXtgfJRX0EQM6YFdRp85hhf6QEnCnGClgSlb5INH1n4');

window.switchPage = (p) => { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById(p).classList.add('active'); };

onAuthStateChanged(auth, (user) => {
    if (!user || user.email !== "bantidoda345@gmail.com") window.location.href = "index.html";
    else { document.body.style.display = "block"; startSync(); }
});

window.createFolder = async (type) => {
    const name = document.getElementById(type+'FolderName').value;
    if(!name) return;
    await addDoc(collection(db, "folders"), { name, type });
    alert("Folder Created!");
};

window.uploadFiles = async (target) => {
    const btn = document.getElementById(target+'UploadBtn');
    const fileInput = document.getElementById(target+'FilePicker');
    const folder = document.getElementById(target+'FolderSelect').value;
    if(!folder || fileInput.files.length === 0) return alert("Select Folder & Files!");
    btn.innerText = "Uploading..."; btn.disabled = true;
    for (const file of fileInput.files) {
        const { error } = await supabase.storage.from('materials').upload(`${target}/${Date.now()}_${file.name}`, file);
        if(!error) {
            const { data } = supabase.storage.from('materials').getPublicUrl(`${target}/${Date.now()}_${file.name}`);
            await addDoc(collection(db, "materials"), { title: file.name, url: data.publicUrl, folder, target });
        }
    }
    btn.innerText = "Upload PDFs"; btn.disabled = false; fileInput.value = "";
};

window.renameFile = async (id, oldTitle) => {
    const newName = prompt("Enter new name:", oldTitle);
    if(newName) await updateDoc(doc(db, "materials", id), { title: newName });
};

window.deleteItem = async (col, id) => { if(confirm('Delete?')) await deleteDoc(doc(db, col, id)); };

function startSync() {
    onSnapshot(collection(db, "users"), (snap) => document.getElementById("userCount").innerText = snap.size);
    
    onSnapshot(collection(db, "complaints"), (snap) => {
        const cont = document.getElementById("complaintsContainer"); cont.innerHTML = "";
        snap.forEach(d => cont.innerHTML += `<div class="list-item">${d.data().text} <b>by ${d.data().userEmail}</b></div>`);
    });

    onSnapshot(collection(db, "folders"), (snap) => {
        ['notes','study'].forEach(t => {
            const sel = document.getElementById(t+'FolderSelect');
            sel.innerHTML = '<option value="">Select Folder</option>';
            snap.forEach(d => { if(d.data().type === t) sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`; });
        });
    });

    onSnapshot(collection(db, "materials"), (snap) => {
        ['notes','study'].forEach(t => {
            const list = document.getElementById(t+'FilesList');
            list.innerHTML = '<h4>Files:</h4>';
            snap.forEach(d => {
                if(d.data().target === t) list.innerHTML += `<div class="list-item">${d.data().title} <div class="icon-group"><i class="fas fa-edit edit-btn" onclick="renameFile('${d.id}', '${d.data().title}')"></i><i class="fas fa-trash delete-btn" onclick="deleteItem('materials','${d.id}')"></i></div></div>`;
            });
        });
    });
}
</script>
</body>
</html>
