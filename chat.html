<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
}

.header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
font-size:22px;
}

.chat-list{
padding:10px;
}

.chat-card{
background:white;
border-radius:12px;
padding:12px;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#0d47a1;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
}

.name{
font-weight:bold;
font-size:15px;
}

.msg{
font-size:13px;
color:gray;
margin-top:3px;
}

.right{
text-align:right;
}

.time{
font-size:12px;
color:gray;
}

.badge{
background:#0d47a1;
color:white;
width:22px;
height:22px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
margin-top:5px;
margin-left:auto;
}

.fab{
position:fixed;
right:20px;
bottom:95px;
width:55px;
height:55px;
border:none;
border-radius:50%;
background:#0d47a1;
color:white;
font-size:24px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:13px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>
</head>

<body>

<div class="header">
<h2>Private Chats</h2>
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="chat-list">

<div class="chat-card">
<div class="left">
<div class="avatar">A</div>
<div>
<div class="name">Aman</div>
<div class="msg">Hello bhai...</div>
</div>
</div>

<div class="right">
<div class="time">10:35</div>
<div class="badge">2</div>
</div>
</div>

<div class="chat-card">
<div class="left">
<div class="avatar">R</div>
<div>
<div class="name">Rahul</div>
<div class="msg">Notes bhej dena</div>
</div>
</div>

<div class="right">
<div class="time">09:10</div>
</div>
</div>

<div class="chat-card">
<div class="left">
<div class="avatar">N</div>
<div>
<div class="name">Neha</div>
<div class="msg">Thanks 😊</div>
</div>
</div>

<div class="right">
<div class="time">Yesterday</div>
</div>
</div>

</div>

<button class="fab">
<i class="fa-solid fa-plus"></i>
</button>

<nav class="bottom-nav">

<a href="index.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="study.html">
<i class="fa-solid fa-book"></i>
Study
</a>

<a href="chat.html">
<i class="fa-solid fa-comments"></i>
Chat
</a>

<a href="community.html">
<i class="fa-solid fa-users"></i>
Community
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>

</nav>

</body>
</html>
