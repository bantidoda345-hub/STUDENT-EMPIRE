<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students Empire</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

/* BACKGROUND (SKIN + GREEN MIX) */
body{
  margin:0;
  font-family:Arial;
  background:#f5e6d3; /* skin color */
  color:black;
}

/* TOP BAR */
.header{
  background:#128C7E;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  position:sticky;
  top:0;
}

/* SEARCH */
.searchBox{
  display:flex;
  padding:10px;
  gap:5px;
  background:#fff;
}

.searchBox input{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
}

.searchBox button{
  background:#25D366;
  border:none;
  color:white;
  padding:10px;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 120px);
}

/* USERS */
.users{
  width:35%;
  background:#fff;
  overflow:auto;
  border-right:1px solid #ddd;
}

.user{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.user:hover{
  background:#f1f1f1;
}

/* CHAT */
.chat{
  width:65%;
  display:flex;
  flex-direction:column;
  background:#f5e6d3;
}

#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MSG */
.msg{
  padding:8px;
  margin:5px;
  max-width:70%;
  border-radius:10px;
}

.me{
  background:#DCF8C6;
  margin-left:auto;
}

.other{
  background:white;
  border:1px solid #ddd;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:10px;
  background:white;
}

input{
  flex:1;
  padding:10px;
}

button{
  background:#25D366;
  border:none;
  color:white;
  padding:10px;
}

.req{
  padding:10px;
  border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">🎓 Students Empire Chat</div>

<!-- SEARCH -->
<div class="searchBox">
  <input id="search" placeholder="Search name">
  <button onclick="searchUsers()">Search</button>
  <button onclick="loadUsers()">All</button>
</div>

<div class="container">

  <!-- USERS -->
  <div class="users">

    <h4 style="padding:10px;">Requests</h4>
    <div id="requests"></div>

    <h4 style="padding:10px;">Users</h4>
    <div id="users"></div>

  </div>

  <!-- CHAT -->
  <div class="chat">

    <div id="chatBox"></div>

    <div class="inputBox">
      <input id="msg" placeholder="message">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="chat.js"></script>

</body>
</html>
