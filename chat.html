<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro+</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff}

/* TOP */
.top{
background:#111;color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* SEARCH */
.search{display:flex;padding:10px;gap:8px}
.search input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px}
.search button{padding:10px;background:#000;color:#fff;border:none;border-radius:8px}

/* USERS */
#users{padding:10px}
.user{
padding:10px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
cursor:pointer;
}
.small{font-size:12px;color:gray}

/* CHAT */
#chatBox{display:none;flex-direction:column;height:70vh;border-top:1px solid #ddd}

#msgs{flex:1;overflow-y:auto;padding:10px}

.msg{
padding:8px 12px;
margin:5px;
border-radius:10px;
max-width:70%;
position:relative;
font-size:14px;
}

.me{background:#000;color:#fff;margin-left:auto}
.other{background:#eee}

/* DELETE BTN */
.del{
position:absolute;
top:0;right:5px;
font-size:10px;
cursor:pointer;
}

/* INPUT */
#input{display:flex;padding:10px;border-top:1px solid #ddd;gap:5px}
#input input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px}
#input button{background:#000;color:#fff;border:none;padding:10px;border-radius:8px}

/* typing */
#typing{
font-size:12px;
color:gray;
padding-left:10px;
}
</style>
</head>

<body>

<div class="top">
<div id="chatName">Chat</div>
<div id="status">●</div>
</div>

<div class="search">
<input id="searchInput" placeholder="Search user">
<button onclick="searchUser()">Search</button>
</div>

<div id="users"></div>

<div id="chatBox">
<div id="typing"></div>
<div id="msgs"></div>

<div id="input">
<input id="msgInput" placeholder="Message..." oninput="typing()">
<input type="file" id="img">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX",
storageBucket:"XXX"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let me,chatWith,chatId;

/* LOGIN */
auth.onAuthStateChanged(u=>{
if(u){
me=u;
setOnline(true);
}
});

/* ONLINE */
function setOnline(v){
db.collection("users").doc(me.uid).set({
online:v,last:Date.now()
},{merge:true});
}

/* SEARCH */
function searchUser(){
let v=document.getElementById("searchInput").value.toLowerCase();
document.getElementById("users").innerHTML="";

db.collection("users").get().then(s=>{
s.forEach(d=>{
let u=d.data();
if(u.uid!=me.uid && u.name.toLowerCase().includes(v)){

let div=document.createElement("div");
div.className="user";
div.innerHTML=`
<div>
<b>${u.name}</b>
<div class="small">${u.online?"Online":"Offline"}</div>
</div>
`;

div.onclick=()=>openChat(u);

document.getElementById("users").appendChild(div);
}
});
});
}

/* OPEN CHAT */
function openChat(u){
chatWith=u;
chatId=[me.uid,u.uid].sort().join("_");

document.getElementById("chatBox").style.display="flex";
document.getElementById("chatName").innerText=u.name;

loadMessages();
listenTyping();
}

/* MESSAGES */
function loadMessages(){
db.collection("chats").doc(chatId)
.collection("msgs")
.orderBy("time")
.onSnapshot(s=>{
let box=document.getElementById("msgs");
box.innerHTML="";

s.forEach(doc=>{
let m=doc.data();

let div=document.createElement("div");
div.className="msg "+(m.uid==me.uid?"me":"other");

div.innerHTML=`
${m.text||""}
${m.img?`<br><img src="${m.img}" width="120">`:""}
<span class="del" onclick="delMsg('${doc.id}', '${m.uid}')">x</span>
`;

box.appendChild(div);
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND MESSAGE + IMAGE */
async function sendMsg(){
let txt=document.getElementById("msgInput").value;
let file=document.getElementById("img").files[0];

let imgURL="";

if(file){
let ref=storage.ref("chat/"+Date.now()+file.name);
await ref.put(file);
imgURL=await ref.getDownloadURL();
}

if(!txt && !imgURL) return;

db.collection("chats").doc(chatId)
.collection("msgs").add({
text:txt,
img:imgURL,
uid:me.uid,
time:Date.now(),
seen:false
});

document.getElementById("msgInput").value="";
document.getElementById("img").value="";
}

/* DELETE MESSAGE */
function delMsg(id,uid){
if(uid!=me.uid) return;

db.collection("chats").doc(chatId)
.collection("msgs").doc(id).delete();
}

/* TYPING */
function typing(){
db.collection("typing").doc(chatId).set({
uid:me.uid,
time:Date.now()
});
}

/* LISTEN TYPING */
function listenTyping(){
db.collection("typing").doc(chatId)
.onSnapshot(d=>{
if(d.exists){
let t=d.data();
if(t.uid!=me.uid){
document.getElementById("typing").innerText="typing...";
setTimeout(()=>{
document.getElementById("typing").innerText="";
},1500);
}
}
});
}

/* OFFLINE */
window.onbeforeunload=()=>{
setOnline(false);
};
</script>

</body>
</html>
