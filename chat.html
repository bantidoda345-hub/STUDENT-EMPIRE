<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
height: 100vh;
display: flex;
flex-direction: column;
}

.header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
flex-direction: column;
gap: 10px;
position: sticky;
top: 0;
z-index: 10;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.header-top {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
}

.header h2{
font-size:22px;
}

/* लाइव सर्च बार डिज़ाइन */
.search-container {
display: flex;
background: rgba(255, 255, 255, 0.15);
border-radius: 20px;
padding: 6px 12px;
align-items: center;
gap: 8px;
width: 100%;
}
.search-container input {
background: none;
border: none;
color: white;
outline: none;
width: 100%;
font-size: 14px;
}
.search-container input::placeholder {
color: rgba(255,255,255,0.7);
}
.search-container i {
color: white;
}

/* Tabs UI System */
.chat-tabs {
display: flex;
background: white;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.chat-tabs div {
flex: 1;
text-align: center;
padding: 12px;
font-weight: bold;
color: gray;
cursor: pointer;
border-bottom: 3px solid transparent;
font-size: 14px;
position: relative;
}
.chat-tabs div.active-tab {
color: #0d47a1;
border-bottom: 3px solid #0d47a1;
}

/* व्हाट्सएप जैसा लाल बिंदु (Red Dot Notification) */
.badge-dot {
position: absolute;
top: 10px;
right: 25%;
width: 8px;
height: 8px;
background-color: #ff3b30;
border-radius: 50%;
display: none;
}

/* Screen Management */
.screen {
display: none;
flex: 1;
overflow-y: auto;
padding: 10px;
}
.screen.active-screen {
display: block;
}

/* Chat Card Style */
.chat-card{
background:white;
border-radius:12px;
padding:12px;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,.08);
cursor: pointer;
transition: transform 0.1s;
}
.chat-card:active {
transform: scale(0.98);
}

.left{
display:flex;
align-items:center;
gap:12px;
flex: 1;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#0d47a1;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:bold;
overflow: hidden;
flex-shrink: 0;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}

.name{
font-weight:bold;
font-size:15px;
color: #2c3e50;
}

.msg{
font-size:13px;
color:gray;
margin-top:3px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 200px;
}

.right{
text-align:right;
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 5px;
}

.time{
font-size:11px;
color:gray;
}

.card-badge {
width: 8px;
height: 8px;
background-color: #ff3b30;
border-radius: 50%;
}

.action-btn {
background: #0d47a1;
color: white;
border: none;
padding: 8px 14px;
border-radius: 20px;
font-size: 12px;
font-weight: bold;
cursor: pointer;
}
.action-btn.secondary {
background: #2e7d32;
}
.action-btn.pending {
background: #ef6c00;
}

/* Realtime Private Chat Popup View */
#privateChatWindow {
display: none;
flex-direction: column;
background: #e5ddd5;
position: fixed;
top: 0;
left: 0;
right: 0;
bottom: 0;
z-index: 2000;
}
.win-header {
background: #0d47a1;
color: white;
padding: 10px 15px;
display: flex;
align-items: center;
gap: 12px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.win-header .back-icon {
font-size: 20px;
cursor: pointer;
padding: 5px;
}
.win-header .avatar {
width: 40px;
height: 40px;
font-size: 16px;
}
.win-messages {
flex: 1;
overflow-y: auto;
padding: 15px;
display: flex;
flex-direction: column;
gap: 8px;
padding-bottom: 80px;
}
.bubble {
max-width: 75%;
padding: 8px 12px;
border-radius: 12px;
font-size: 14px;
line-height: 1.4;
word-wrap: break-word;
box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.bubble.me {
background: #d9fdd3;
color: #303030;
align-self: flex-end;
border-top-right-radius: 2px;
}
.bubble.friend {
background: white;
color: black;
align-self: flex-start;
border-top-left-radius: 2px;
}

.win-input-bar {
position: fixed;
bottom: 0;
left: 0;
right: 0;
display: flex;
padding: 10px;
background: #f0f0f0;
align-items: center;
}
.win-input-bar input {
flex: 1;
padding: 10px 15px;
border: none;
border-radius: 20px;
outline: none;
font-size: 14px;
background: white;
}
.win-input-bar button {
background: #0d47a1;
color: white;
border: none;
padding: 10px 14px;
border-radius: 50%;
margin-left: 8px;
cursor: pointer;
font-size: 15px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
z-index: 10;
}
.bottom-nav a{
text-decoration:none;
color:#333;
font-size:13px;
text-align:center;
}
.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <h2>Private Chats</h2>
  </div>
  <div class="search-container">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="chatSearchInput" placeholder="Search users or chats..." oninput="filterSearch()">
  </div>
</div>

<div class="chat-tabs">
  <div id="btn-tab-chats" class="active-tab" onclick="switchChatTab('tab-chats')">Chats</div>
  <div id="btn-tab-users" onclick="switchChatTab('tab-users')">All Users</div>
  <div id="btn-tab-requests" onclick="switchChatTab('tab-requests')">
    Requests
    <span id="requestBadgeDot" class="badge-dot"></span>
  </div>
</div>

<div id="tab-chats" class="screen active-screen">
  <div class="chat-list" id="activeChatsList">
    <div style="text-align: center; color: #666; padding: 20px;">Loading conversations...</div>
  </div>
</div>

<div id="tab-users" class="screen">
  <div class="chat-list" id="allUsersList">
    <div style="text-align: center; color: #666; padding: 20px;">Loading network...</div>
  </div>
</div>

<div id="tab-requests" class="screen">
  <div class="chat-list" id="friendRequestsList">
    <div style="text-align: center; color: #666; padding: 20px;">No new requests.</div>
  </div>
</div>

<div id="privateChatWindow">
  <div class="win-header">
    <i class="fa-solid fa-arrow-left back-icon" onclick="closePrivateChat()"></i>
    <div class="avatar" id="winAvatar">?</div>
    <div>
      <div class="name" id="winName" style="color: white;">Student</div>
      <div style="font-size: 11px; color: #a5d6a7;">Online / Connected</div>
    </div>
  </div>

  <div class="win-messages" id="winMessagesBox"></div>

  <div class="win-input-bar">
    <input type="text" id="winMessageInput" placeholder="Type a message...">
    <button id="winSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<nav class="bottom-nav">
<a href="home.html"><i class="fa-solid fa-house"></i>Home</a>
<a href="study.html"><i class="fa-solid fa-book"></i>Study</a>
<a href="chat.html"><i class="fa-solid fa-comments"></i>Chat</a>
<a href="community.html"><i class="fa-solid fa-users"></i>Community</a>
<a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let activeRoomId = null;
let msgUnsubscribe = null;
let currentTab = "tab-chats";

let globalCachedUsers = [];
let globalCachedFriendships = [];
let globalCachedRequests = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    currentUser = user;

    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid,
      name: user.displayName || "Empire Student",
      email: user.email,
      photo: user.photoURL || "",
      lastActive: new Date()
    }, { merge: true });

    initRealtimeData();
  }
});

function initRealtimeData() {
  listenAllUsers();
  listenIncomingRequests();
  listenChatRooms();
}

function listenAllUsers() {
  onSnapshot(collection(db, "users"), (snapshot) => {
    globalCachedUsers = [];
    snapshot.forEach(d => {
      if(d.data().uid !== currentUser.uid) {
        globalCachedUsers.push(d.data());
      }
    });
    if(currentTab === "tab-users") renderUsersList(globalCachedUsers);
  });
}

function renderUsersList(usersArray) {
  const list = document.getElementById("allUsersList");
  list.innerHTML = usersArray.length === 0 ? '<div style="text-align:center;color:gray;padding:20px;">No users found</div>' : '';

  usersArray.forEach(u => {
    let pfx = u.photo ? `<img src="${u.photo}">` : u.name.charAt(0);
    const card = document.createElement("div");
    card.className = "chat-card";
    card.innerHTML = `
      <div class="left">
        <div class="avatar">${pfx}</div>
        <div>
          <div class="name">${u.name}</div>
          <div class="msg">${u.email}</div>
        </div>
      </div>
      <button class="action-btn" id="ubtn-${u.uid}">Connect</button>
    `;
    list.appendChild(card);
    syncButtonStatus(u.uid);
  });
}

window.triggerRequest = async function(targetUid) {
  const reqId = `${currentUser.uid}_${targetUid}`;
  await setDoc(doc(db, "friend_requests", reqId), {
    fromId: currentUser.uid,
    fromName: currentUser.displayName || "Empire Student",
    fromPhoto: currentUser.photoURL || "",
    toId: targetUid,
    status: "pending",
    timestamp: new Date()
  });
  alert("Friend request sent!");
};

function syncButtonStatus(targetUid) {
  const btn = document.getElementById(`ubtn-${targetUid}`);
  if(!btn) return;

  btn.onclick = () => triggerRequest(targetUid);

  const pendingReq = globalCachedRequests.find(r => r.fromId === currentUser.uid && r.toId === targetUid && r.status === "pending");
  if(pendingReq) {
    btn.innerText = "Pending";
    btn.className = "action-btn pending";
    btn.onclick = null;
    return;
  }

  const combId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;
  const isFriend = globalCachedFriendships.some(f => f.id === combId);
  if(isFriend) {
    btn.innerText = "Chat";
    btn.className = "action-btn secondary";
    btn.onclick = () => launchChat(targetUid);
  }
}

function listenIncomingRequests() {
  const q = query(collection(db, "friend_requests"), where("toId", "==", currentUser.uid), where("status", "==", "pending"));
  onSnapshot(q, (snapshot) => {
    globalCachedRequests = [];
    snapshot.forEach(d => globalCachedRequests.push({id: d.id, ...d.data()}));
    
    const badge = document.getElementById("requestBadgeDot");
    if(globalCachedRequests.length > 0) {
      badge.style.display = "block";
    } else {
      badge.style.display = "none";
    }

    if(currentTab === "tab-requests") renderRequestsList(globalCachedRequests);
  });
}

function renderRequestsList(reqArray) {
  const list = document.getElementById("friendRequestsList");
  list.innerHTML = reqArray.length === 0 ? '<div style="text-align:center;color:gray;padding:20px;">No new requests.</div>' : '';

  reqArray.forEach(r => {
    let pfx = r.fromPhoto ? `<img src="${r.fromPhoto}">` : r.fromName.charAt(0);
    const card = document.createElement("div");
    card.className = "chat-card";
    card.innerHTML = `
      <div class="left">
        <div class="avatar">${pfx}</div>
        <div>
          <div class="name">${r.fromName}</div>
          <div class="msg">Wants to connect with you</div>
        </div>
      </div>
      <button class="action-btn secondary" onclick="acceptFriendship('${r.id}', '${r.fromId}')">Accept</button>
    `;
    list.appendChild(card);
  });
}

window.acceptFriendship = async function(docId, fromId) {
  await setDoc(doc(db, "friend_requests", docId), { status: "accepted" }, { merge: true });

  const combId = currentUser.uid < fromId ? `${currentUser.uid}_${fromId}` : `${fromId}_${currentUser.uid}`;
  await setDoc(doc(db, "friendships", combId), {
    pair: [currentUser.uid, fromId],
    lastMessage: "Connected! Start chatting...",
    timestamp: new Date(),
    seenBy: [currentUser.uid] // Shuruat me jisne accept kiya usne dekh liya hai
  });
  
  alert("Request Accepted!");
  switchChatTab('tab-chats');
};

function listenChatRooms() {
  const q = query(collection(db, "friendships"), where("pair", "array-contains", currentUser.uid), orderBy("timestamp", "desc"));
  onSnapshot(q, async (snapshot) => {
    globalCachedFriendships = [];
    
    for (const docSnap of snapshot.docs) {
      const f = docSnap.data();
      const targetId = f.pair.find(id => id !== currentUser.uid);
      
      const userRef = doc(db, "users", targetId);
      const userSnap = await getDoc(userRef);
      let targetName = "Empire Student";
      let targetPhoto = "";
      
      if(userSnap.exists()) {
        targetName = userSnap.data().name;
        targetPhoto = userSnap.data().photo;
      }

      globalCachedFriendships.push({
        id: docSnap.id,
        targetId: targetId,
        targetName: targetName,
        targetPhoto: targetPhoto,
        ...f
      });
    }

    if(currentTab === "tab-chats") renderChatsList(globalCachedFriendships);
  });
}

function renderChatsList(chatsArray) {
  const list = document.getElementById("activeChatsList");
  list.innerHTML = chatsArray.length === 0 ? '<div style="text-align:center;color:gray;padding:20px;">No active chats yet. Go to "All Users" to connect!</div>' : '';

  chatsArray.forEach(f => {
    let pfx = f.targetPhoto ? `<img src="${f.targetPhoto}">` : f.targetName.charAt(0);
    let timeStr = f.timestamp ? f.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
    
    // Agar seenBy array me hamari current UID nahi hai, toh message unread (Red Dot dikhao)
    const isUnread = f.seenBy ? !f.seenBy.includes(currentUser.uid) : true;
    const dotHtml = isUnread ? `<div class="card-badge"></div>` : '';

    const card = document.createElement("div");
    card.className = "chat-card";
    card.onclick = () => launchChat(f.targetId);
    card.innerHTML = `
      <div class="left">
        <div class="avatar">${pfx}</div>
        <div>
          <div class="name">${f.targetName}</div>
          <div class="msg">${f.lastMessage}</div>
        </div>
      </div>
      <div class="right">
        <div class="time">${timeStr}</div>
        ${dotHtml}
      </div>
    `;
    list.appendChild(card);
  });
}

async function launchChat(targetId) {
  activeRoomId = currentUser.uid < targetId ? `${currentUser.uid}_${targetId}` : `${targetId}_${currentUser.uid}`;

  const uDoc = await getDoc(doc(db, "users", targetId));
  if(uDoc.exists()) {
    const data = uDoc.data();
    document.getElementById("winName").innerText = data.name;
    document.getElementById("winAvatar").innerHTML = data.photo ? `<img src="${data.photo}">` : data.name.charAt(0);
  }

  document.getElementById("privateChatWindow").style.display = "flex";

  // Jab hamne chat open kar li, toh hum apni ID 'seenBy' array me merge kar rahe hain (Mark as Read)
  const friendshipRef = doc(db, "friendships", activeRoomId);
  const fsnap = await getDoc(friendshipRef);
  if(fsnap.exists()) {
    let currentSeenBy = fsnap.data().seenBy || [];
    if(!currentSeenBy.includes(currentUser.uid)) {
      currentSeenBy.push(currentUser.uid);
      await setDoc(friendshipRef, { seenBy: currentSeenBy }, { merge: true });
    }
  }

  if(msgUnsubscribe) msgUnsubscribe();

  const mq = query(collection(db, "private_rooms", activeRoomId, "messages"), orderBy("timestamp", "asc"));
  msgUnsubscribe = onSnapshot(mq, (snap) => {
    const mBox = document.getElementById("winMessagesBox");
    mBox.innerHTML = "";

    snap.forEach(mDoc => {
      const m = mDoc.data();
      const bubble = document.createElement("div");
      bubble.className = `bubble ${m.senderId === currentUser.uid ? 'me' : 'friend'}`;
      bubble.innerText = m.text;
      mBox.appendChild(bubble);
    });
    mBox.scrollTop = mBox.scrollHeight;
  });
}

window.closePrivateChat = function() {
  document.getElementById("privateChatWindow").style.display = "none";
  if(msgUnsubscribe) msgUnsubscribe();
};

document.getElementById("winSendBtn").addEventListener("click", emitMessage);
document.getElementById("winMessageInput").addEventListener("keypress", (e) => {
  if(e.key === "Enter") emitMessage();
});

async function emitMessage() {
  const input = document.getElementById("winMessageInput");
  const text = input.value.trim();
  if(!text || !activeRoomId) return;

  await addDoc(collection(db, "private_rooms", activeRoomId, "messages"), {
    senderId: currentUser.uid,
    text: text,
    timestamp: new Date()
  });

  // Jab hum naya message bhejenge, toh array me sirf hamari ID rahegi.
  // Is se saamne wale ke pass automatic Red Dot chala jayega kyunki uski ID array me nahi hogi.
  await setDoc(doc(db, "friendships", activeRoomId), {
    lastMessage: text,
    timestamp: new Date(),
    seenBy: [currentUser.uid] 
  }, { merge: true });

  input.value = "";
}

window.filterSearch = function() {
  const queryText = document.getElementById("chatSearchInput").value.toLowerCase().trim();

  if(currentTab === "tab-users") {
    const filtered = globalCachedUsers.filter(u => u.name.toLowerCase().includes(queryText) || u.email.toLowerCase().includes(queryText));
    renderUsersList(filtered);
  } 
  else if(currentTab === "tab-chats") {
    const filtered = globalCachedFriendships.filter(f => f.targetName.toLowerCase().includes(queryText) || f.lastMessage.toLowerCase().includes(queryText));
    renderChatsList(filtered);
  }
  else if(currentTab === "tab-requests") {
    const filtered = globalCachedRequests.filter(r => r.fromName.toLowerCase().includes(queryText));
    renderRequestsList(filtered);
  }
};

window.switchChatTab = function(screenId) {
  currentTab = screenId;
  document.getElementById("chatSearchInput").value = "";

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
  document.querySelectorAll('.chat-tabs div').forEach(t => t.classList.remove('active-tab'));

  document.getElementById(screenId).classList.add('active-screen');
  
  if(screenId === "tab-chats") {
    document.getElementById("btn-tab-chats").classList.add('active-tab');
    renderChatsList(globalCachedFriendships);
  } else if(screenId === "tab-users") {
    document.getElementById("btn-tab-users").classList.add('active-tab');
    renderUsersList(globalCachedUsers);
  } else if(screenId === "tab-requests") {
    document.getElementById("btn-tab-requests").classList.add('active-tab');
    renderRequestsList(globalCachedRequests);
  }
};
</script>

</body>
</html>
