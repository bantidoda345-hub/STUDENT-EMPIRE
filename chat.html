<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff}

/* TOP */
.top{
background:#111;
color:#fff;
padding:12px;
text-align:center;
font-weight:bold;
}

/* SEARCH */
.search{
display:flex;
padding:10px;
}
.search input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

/* USERS LIST */
#users{
padding:5px 10px;
}

.user{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.user small{
color:gray;
font-size:12px;
}

/* CHAT BOX */
#chatBox{
display:none;
flex-direction:column;
height:70vh;
border-top:1px solid #ddd;
}

#header{
padding:10px;
background:#f5f5f5;
font-weight:bold;
display:flex;
justify-content:space-between;
}

#typing{
font-size:12px;
color:gray;
padding-left:10px;
}

#msgs{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
padding:8px 12px;
margin:5px;
border-radius:10px;
max-width:70%;
font-size:14px;
}

.me{background:#000;color:#fff;margin-left:auto}
.other{background:#eee}

/* INPUT */
#input{
display:flex;
padding:10px;
gap:5px;
border-top:1px solid #ddd;
}

#input input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

#input button{
padding:10px;
background:#000;
color:#fff;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="top">CHAT SYSTEM</div>

<!-- SEARCH -->
<div class="search">
<input id="searchInput" placeholder="Search username..." oninput="liveSearch()">
</div>

<!-- USERS -->
<div id="users"></div>

<!-- CHAT -->
<div id="chatBox">

<div id="header">
<div id="chatName">Chat</div>
<div id="status"></div>
</div>

<div id="typing"></div>

<div id="msgs"></div>

<div id="input">
<input id="msgInput" placeholder="Message..." oninput="typing()">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>

const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX",
storageBucket:"XXX"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let me,chatWith,chatId;

/* LOGIN */
auth.onAuthStateChanged(u=>{
if(u){
me=u;
setOnline(true);
}
});

/* ONLINE */
function setOnline(v){
db.collection("users").doc(me.uid).set({
online:v,
last:Date.now()
},{merge:true});
}

/* LIVE SEARCH (WHATSAPP STYLE) */
function liveSearch(){

let v = document.getElementById("searchInput").value.toLowerCase();

document.getElementById("users").innerHTML="";

if(v.length === 0) return;

db.collection("users").get().then(snap=>{
snap.forEach(doc=>{
let u = doc.data();

if(u.uid !== me.uid && u.name.startsWith(v)){

let div = document.createElement("div");
div.className="user";

div.innerHTML=`
<b>${u.originalName}</b><br>
<small>${u.online ? "Online" : "Offline"}</small>
`;

div.onclick=()=>openChat(u);

document.getElementById("users").appendChild(div);
}
});
});
}

/* OPEN CHAT */
function openChat(u){

chatWith=u;
chatId=[me.uid,u.uid].sort().join("_");

document.getElementById("chatBox").style.display="flex";
document.getElementById("chatName").innerText=u.originalName;

loadMessages();
listenTyping();
}

/* MESSAGES */
function loadMessages(){

db.collection("chats")
.doc(chatId)
.collection("msgs")
.orderBy("time")
.onSnapshot(snap=>{

let box=document.getElementById("msgs");
box.innerHTML="";

snap.forEach(doc=>{
let m=doc.data();

let div=document.createElement("div");
div.className="msg "+(m.uid==me.uid?"me":"other");

div.innerText = m.text || "";

box.appendChild(div);
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND MESSAGE */
function sendMsg(){

let txt=document.getElementById("msgInput").value;
if(!txt) return;

db.collection("chats")
.doc(chatId)
.collection("msgs")
.add({
text:txt,
uid:me.uid,
time:Date.now()
});

document.getElementById("msgInput").value="";
}

/* TYPING */
function typing(){

db.collection("typing")
.doc(chatId)
.set({
uid:me.uid,
time:Date.now()
});
}

/* LISTEN TYPING */
function listenTyping(){

db.collection("typing")
.doc(chatId)
.onSnapshot(doc=>{
if(doc.exists){
let t=doc.data();

if(t.uid !== me.uid){
document.getElementById("typing").innerText="typing...";

setTimeout(()=>{
document.getElementById("typing").innerText="";
},1200);
}
}
});
}

/* ONLINE OFF */
window.onbeforeunload=()=>{
setOnline(false);
};

</script>

</body>
</html>
