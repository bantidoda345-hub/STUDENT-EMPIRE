<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

/* BACKGROUND (WHATSAPP STYLE) */
body{
  margin:0;
  font-family:Arial;
  background:#0b141a;
  color:white;
}

/* TOP BAR */
.header{
  background:#128C7E;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
  position:sticky;
  top:0;
}

/* SEARCH BAR */
.searchBox{
  display:flex;
  padding:10px;
  background:#111b21;
  gap:8px;
}

.searchBox input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  border-radius:5px;
}

.searchBox button{
  background:#25D366;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 120px);
}

/* USERS PANEL */
.users{
  width:35%;
  background:#111b21;
  overflow:auto;
}

.user{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.user:hover{
  background:#1f2c33;
}

.small{
  font-size:12px;
  color:gray;
}

/* CHAT AREA */
.chat{
  width:65%;
  display:flex;
  flex-direction:column;
}

/* CHAT BOX */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.msg{
  padding:8px;
  margin:5px;
  max-width:70%;
  border-radius:10px;
  word-wrap:break-word;
}

.me{
  background:#005c4b;
  margin-left:auto;
}

.other{
  background:#202c33;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:10px;
  background:#1f2c33;
}

.inputBox input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.inputBox button{
  background:#25D366;
  border:none;
  padding:10px 15px;
  color:white;
}

/* REQUEST BOX */
.req{
  padding:10px;
  border-bottom:1px solid #333;
}

.req button{
  background:#25D366;
  border:none;
  padding:5px 10px;
  color:white;
  margin-top:5px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  🎓 Students Empire Chat
</div>

<!-- SEARCH -->
<div class="searchBox">
  <input id="search" placeholder="Search name or phone">
  <button onclick="searchUsers()">Search</button>
  <button onclick="loadUsers()">All</button>
</div>

<div class="container">

  <!-- USERS + REQUESTS -->
  <div class="users">

    <h4 style="padding:10px;">Friend Requests</h4>
    <div id="requests"></div>

    <h4 style="padding:10px;">Users</h4>
    <div id="users"></div>

  </div>

  <!-- CHAT -->
  <div class="chat">

    <div id="chatBox"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="chat.js"></script>

</body>
</html>
