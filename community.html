<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Community</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
}

.header{
background:#0d47a1;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.post-box{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.post-box textarea{
width:100%;
height:80px;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
resize:none;
}

.post-btn{
margin-top:10px;
width:100%;
padding:12px;
background:#0d47a1;
color:white;
border:none;
border-radius:8px;
}

.post{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.user{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#0d47a1;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.name{
font-weight:bold;
}

.time{
font-size:12px;
color:gray;
}

.content{
margin-top:10px;
line-height:1.5;
}

.actions{
display:flex;
justify-content:space-around;
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

.actions i{
color:#0d47a1;
margin-right:5px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:13px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>

</head>
<body>

<div class="header">
<h2>Community</h2>
<i class="fa-solid fa-bell"></i>
</div>

<div class="post-box">
<textarea placeholder="Share something with students..."></textarea>
<button class="post-btn">Post</button>
</div>

<div class="post">

<div class="user">
<div class="avatar">A</div>

<div>
<div class="name">Aman</div>
<div class="time">2 Hours Ago</div>
</div>
</div>

<div class="content">
Physics Chapter 5 ke notes upload kar diye hain. Check kar lo.
</div>

<div class="actions">
<div><i class="fa-solid fa-heart"></i> Like</div>
<div><i class="fa-solid fa-comment"></i> Comment</div>
<div><i class="fa-solid fa-share"></i> Share</div>
</div>

</div>

<div class="post">

<div class="user">
<div class="avatar">R</div>

<div>
<div class="name">Rahul</div>
<div class="time">Yesterday</div>
</div>
</div>

<div class="content">
Kisi ke paas RRB NTPC ke latest PYQ hain?
</div>

<div class="actions">
<div><i class="fa-solid fa-heart"></i> Like</div>
<div><i class="fa-solid fa-comment"></i> Comment</div>
<div><i class="fa-solid fa-share"></i> Share</div>
</div>

</div>

<nav class="bottom-nav">

<a href="index.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="study.html">
<i class="fa-solid fa-book"></i>
Study
</a>

<a href="chat.html">
<i class="fa-solid fa-comments"></i>
Chat
</a>

<a href="community.html">
<i class="fa-solid fa-users"></i>
Community
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>

</nav>

</body>
</html>
