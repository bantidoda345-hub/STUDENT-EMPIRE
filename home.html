<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
}

header{
background:#0d47a1;
color:white;
padding:15px;
}

.logo h2{
font-size:24px;
}

.logo p{
font-size:12px;
opacity:.8;
}

.banner{
margin:15px;
background:linear-gradient(135deg,#0d47a1,#1976d2);
color:white;
padding:25px;
border-radius:15px;
}

.banner h1{
font-size:24px;
margin-bottom:10px;
}

.quick-title{
padding:0 15px;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.quick-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
transition: transform 0.2s;
}

.card:active {
transform: scale(0.95);
}

.card i{
font-size:30px;
color:#0d47a1;
margin-bottom:10px;
}

.card span{
display:block;
font-size:15px;
font-weight:bold;
}

.updates{
padding:15px;
}

.updates h3{
margin-bottom:10px;
}

.update-box{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
display: flex;
align-items: center;
gap: 10px;
}

.update-box i {
color: #0d47a1;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
z-index: 1000;
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:14px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>
</head>

<body>

<header>
<div class="logo">
<h2>STUDENTS EMPIRE</h2>
<p>Empowering Students, Building Futures</p>
</div>
</header>

<section class="banner">
<h1 id="welcomeUser">Welcome To Students Empire</h1>
<p>Your All-In-One Platform For Academic Success</p>
</section>

<div class="quick-title">Quick Access</div>

<section class="quick-grid">
<div class="card" onclick="window.location.href='study.html'">
<i class="fa-solid fa-book"></i>
<span>Study Material</span>
</div>

<div class="card" onclick="window.location.href='notes.html'">
<i class="fa-solid fa-note-sticky"></i>
<span>Notes</span>
</div>

<div class="card" onclick="window.location.href='study.html'">
<i class="fa-solid fa-file-pdf"></i>
<span>PYQ Papers</span>
</div>

<div class="card" onclick="window.location.href='chat.html'">
<i class="fa-solid fa-comments"></i>
<span>Private Chat</span>
</div>

<div class="card" onclick="window.location.href='community.html'">
<i class="fa-solid fa-users"></i>
<span>Community</span>
</div>

<div class="card" onclick="window.location.href='profile.html'">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</div>
</section>

<section class="updates">
<h3>Recent Updates</h3>
<div id="updatesContainer">
  <div class="update-box"><i class="fa-solid fa-bell"></i> Loading recent updates...</div>
</div>
</section>

<nav class="bottom-nav">
<a href="home.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="study.html">
<i class="fa-solid fa-book"></i>
Study
</a>

<a href="chat.html">
<i class="fa-solid fa-comments"></i>
Chat
</a>

<a href="community.html">
<i class="fa-solid fa-users"></i>
Community
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
  measurementId: "G-ETHZNFTT7S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// सिक्योरिटी लॉक और यूजर का नाम दिखाना
onAuthStateChanged(auth, (user) => {
  if (!user) {
    // अगर लॉगिन नहीं है तो वापस ढकेलो
    window.location.href = "index.html";
  } else {
    // यूजर का नाम बैनर में दिखाना
    if(user.displayName) {
      document.getElementById("welcomeUser").innerText = `Welcome, ${user.displayName}!`;
    }
    loadRecentUpdates();
  }
});

// एडमिन पैनल से अपलोड होने वाली लेटेस्ट 3 फाइल्स को यहाँ दिखाना
function loadRecentUpdates() {
  const q = query(collection(db, "materials"), orderBy("uploadedAt", "desc"), limit(3));
  
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("updatesContainer");
    
    if (snapshot.empty) {
      container.innerHTML = '<div class="update-box"><i class="fa-solid fa-circle-info"></i> No recent updates available.</div>';
      return;
    }
    
    container.innerHTML = ""; // पुराना साफ़ करें
    
    snapshot.forEach((doc) => {
      const data = doc.data();
      container.innerHTML += `
        <div class="update-box" style="cursor:pointer;" onclick="window.location.href='study.html'">
          <i class="fa-solid fa-file-circle-plus"></i>
          <span>New PDF Added: <b>${data.title}</b> in ${data.folder}</span>
        </div>
      `;
    });
  });
}
</script>

</body>
</html>
