<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire - Professional Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root { --primary: #0d47a1; --bg: #f4f7fe; }
    *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding-bottom: 90px; }

    /* Header - Professional Look */
    .brand-section { background: var(--primary); padding: 50px 20px 80px; text-align: center; color: white; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
    .brand-section h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .brand-section p { font-size: 20px; font-weight: 600; opacity: 1; }

    /* Grid - Bigger Buttons */
    .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; margin-top: -50px; }
    .btn-card { background: white; padding: 25px 15px; border-radius: 25px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.06); cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
    .btn-card i { font-size: 32px; color: var(--primary); margin-bottom: 12px; }
    .btn-card span { display: block; font-size: 14px; font-weight: 700; color: #2c3e50; }

    /* Updates Section */
    .updates-section { padding: 20px; }
    .updates-section h3 { margin-bottom: 15px; color: #333; font-size: 18px; }
    .update-box { background: white; padding: 18px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }

    /* Classic Navigation */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:15px; box-shadow:0 -2px 10px rgba(0,0,0,.1); z-index: 1000; }
    .bottom-nav a { text-decoration:none; color:#666; font-size:12px; text-align:center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bottom-nav a.active { color: #0d47a1; font-weight: bold; }
</style>
</head>
<body>

<div class="brand-section">
    <h1>STUDENTS EMPIRE</h1>
    <p id="userNameDisplay">Welcome!</p>
</div>

<div class="action-grid">
    <div class="btn-card" onclick="window.location.href='study.html'"><i class="fa-solid fa-book"></i><span>Study</span></div>
    <div class="btn-card" onclick="window.location.href='notes.html'"><i class="fa-solid fa-note-sticky"></i><span>Notes</span></div>
    <div class="btn-card" onclick="window.location.href='chat.html'"><i class="fa-solid fa-comments"></i><span>Doubt</span></div>
    <div class="btn-card" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i><span>Profile</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-pen-nib"></i><span>Mock Test</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-video"></i><span>Videos</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-briefcase"></i><span>Jobs</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-calendar-days"></i><span>Exams</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-star"></i><span>Tips</span></div>
</div>

<div class="updates-section">
    <h3>Recent Updates</h3>
    <div id="updatesContainer">
        <div class="update-box"><i class="fa-solid fa-bell"></i> Checking for new updates...</div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="home.html" class="active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="study.html"><i class="fa-solid fa-book"></i>Study</a>
    <a href="chat.html"><i class="fa-solid fa-comments"></i>Chat</a>
    <a href="community.html"><i class="fa-solid fa-users"></i>Community</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
        authDomain: "student-empires.firebaseapp.com",
        projectId: "student-empires",
        storageBucket: "student-empires.firebasestorage.app",
        messagingSenderId: "509106125707",
        appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
        measurementId: "G-ETHZNFTT7S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("userNameDisplay").innerText = `Welcome, ${user.displayName || 'Student'}`;
            loadUpdates();
        } else {
            window.location.href = "index.html";
        }
    });

    function loadUpdates() {
        const q = query(collection(db, "materials"), orderBy("uploadedAt", "desc"), limit(3));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById("updatesContainer");
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="update-box">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span><b>${data.title}</b><br><small>New addition in ${data.folder}</small></span>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
