<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire - Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root { --primary: #0d47a1; }
    *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f7fe; padding-bottom: 80px; }

    .brand-section { background: var(--primary); padding: 40px 20px 60px; text-align: center; color: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
    .brand-section h1 { font-size: 26px; margin-bottom: 5px; letter-spacing: 1px; }
    .brand-section p { font-size: 15px; opacity: 0.9; font-weight: 500; }

    .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; margin-top: -30px; }
    .btn-card { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #f0f0f0; }
    .btn-card:active { transform: scale(0.96); }
    .btn-card i { font-size: 26px; color: var(--primary); margin-bottom: 10px; }
    .btn-card span { display: block; font-size: 13px; font-weight: bold; color: #333; }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:15px; box-shadow:0 -2px 10px rgba(0,0,0,.1); z-index: 1000; }
    .bottom-nav a { text-decoration:none; color:#666; font-size:12px; text-align:center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bottom-nav a.active { color: #0d47a1; font-weight: bold; }
    .bottom-nav i { font-size: 20px; }
</style>
</head>
<body>

<div class="brand-section">
    <h1>STUDENTS EMPIRE</h1>
    <p id="userNameDisplay">Loading...</p>
</div>

<div class="action-grid">
    <div class="btn-card" onclick="window.location.href='study.html'">
        <i class="fa-solid fa-book"></i><span>Study</span>
    </div>
    <div class="btn-card" onclick="window.location.href='notes.html'">
        <i class="fa-solid fa-note-sticky"></i><span>Notes</span>
    </div>
    <div class="btn-card" onclick="window.location.href='chat.html'">
        <i class="fa-solid fa-comments"></i><span>Doubt</span>
    </div>
    <div class="btn-card" onclick="window.location.href='profile.html'">
        <i class="fa-solid fa-user"></i><span>Profile</span>
    </div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-pen-nib"></i><span>Mock Test</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-video"></i><span>Videos</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-briefcase"></i><span>Jobs</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-calendar-days"></i><span>Exams</span></div>
    <div class="btn-card" onclick="alert('Coming Soon!')"><i class="fa-solid fa-star"></i><span>Tips</span></div>
</div>

<nav class="bottom-nav">
    <a href="home.html" class="active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="study.html"><i class="fa-solid fa-book"></i>Study</a>
    <a href="chat.html"><i class="fa-solid fa-comments"></i>Chat</a>
    <a href="community.html"><i class="fa-solid fa-users"></i>Community</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
        authDomain: "student-empires.firebaseapp.com",
        projectId: "student-empires",
        storageBucket: "student-empires.firebasestorage.app",
        messagingSenderId: "509106125707",
        appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
        measurementId: "G-ETHZNFTT7S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("userNameDisplay").innerText = `Welcome, ${user.displayName || 'Student'}`;
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
