<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire - Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root { --primary: #0d47a1; --bg: #f8f9fa; }
    *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding-bottom: 80px; }

    /* Banner Section */
    .hero-banner { background: var(--primary); padding: 30px 20px; color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
    .hero-banner h2 { font-size: 16px; font-weight: 400; opacity: 0.9; }
    .hero-banner h1 { font-size: 22px; margin-bottom: 5px; }
    .hero-banner p { font-size: 13px; opacity: 0.8; margin-top: 10px; }

    /* Quick Access Grid */
    .section-title { padding: 20px 20px 10px; font-size: 16px; font-weight: bold; color: #333; }
    .quick-access { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; }
    .nav-btn { background: white; padding: 10px 5px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
    .nav-btn i { font-size: 20px; color: var(--primary); margin-bottom: 8px; }
    .nav-btn span { display: block; font-size: 10px; font-weight: 600; color: #555; }

    /* Updates */
    .updates-section { padding: 20px; }
    .update-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    .update-card i { color: var(--primary); }

    /* Nav */
    .bottom-nav { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:12px; border-top: 1px solid #eee; z-index: 1000; }
    .bottom-nav a { text-decoration:none; color:#777; font-size:11px; text-align:center; }
    .bottom-nav a.active { color: var(--primary); }
</style>
</head>
<body>

<div class="hero-banner">
    <h2 id="userNameDisplay">Loading...</h2>
    <h1>STUDENTS EMPIRE</h1>
    <p>Your All-in-One Platform for Academic Success</p>
</div>

<div class="section-title">Quick Access</div>
<div class="quick-access">
    <div class="nav-btn" onclick="window.location.href='study.html'"><i class="fa-solid fa-book"></i><span>Study</span></div>
    <div class="nav-btn" onclick="window.location.href='notes.html'"><i class="fa-solid fa-note-sticky"></i><span>Notes</span></div>
    <div class="nav-btn" onclick="window.location.href='pyq.html'"><i class="fa-solid fa-file-lines"></i><span>PYQ Papers</span></div>
    <div class="nav-btn" onclick="alert('Coming Soon')"><i class="fa-solid fa-video"></i><span>Videos</span></div>
    <div class="nav-btn" onclick="alert('Coming Soon')"><i class="fa-solid fa-book-open"></i><span>E-Books</span></div>
    <div class="nav-btn" onclick="alert('Coming Soon')"><i class="fa-solid fa-bell"></i><span>Updates</span></div>
    <div class="nav-btn" onclick="alert('Coming Soon')"><i class="fa-solid fa-download"></i><span>Downloads</span></div>
    <div class="nav-btn" onclick="window.location.href='community.html'"><i class="fa-solid fa-users"></i><span>Community</span></div>
</div>

<div class="section-title">Recent Updates</div>
<div class="updates-section" id="updatesContainer">
    <div class="update-card">Checking updates...</div>
</div>

<nav class="bottom-nav">
    <a href="home.html" class="active"><i class="fa-solid fa-house"></i><br>Home</a>
    <a href="study.html"><i class="fa-solid fa-book"></i><br>Study</a>
    <a href="chat.html"><i class="fa-solid fa-comments"></i><br>Chat</a>
    <a href="community.html"><i class="fa-solid fa-users"></i><br>Community</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i><br>Profile</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
        authDomain: "student-empires.firebaseapp.com",
        projectId: "student-empires",
        storageBucket: "student-empires.firebasestorage.app",
        messagingSenderId: "509106125707",
        appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
        measurementId: "G-ETHZNFTT7S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("userNameDisplay").innerText = `Welcome, ${user.displayName || 'Student'}`;
            loadUpdates();
        } else {
            window.location.href = "index.html";
        }
    });

    function loadUpdates() {
        const q = query(collection(db, "materials"), orderBy("uploadedAt", "desc"), limit(3));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById("updatesContainer");
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="update-card">
                        <i class="fa-solid fa-bell"></i>
                        <div><b>${data.title}</b><br><small>Added recently</small></div>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
