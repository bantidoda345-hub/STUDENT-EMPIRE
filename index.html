<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d47a1,#1976d2);
}

.login-box{
width:90%;
max-width:400px;
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
font-size:70px;
color:#0d47a1;
margin-bottom:15px;
}

h1{
color:#0d47a1;
margin-bottom:5px;
}

p{
color:#666;
margin-bottom:25px;
}

#googleLogin{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#4285F4;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#googleLogin i{
margin-right:8px;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">
<i class="fa-solid fa-graduation-cap"></i>
</div>

<h1>Students Empire</h1>

<p>Login With Google</p>

<button id="googleLogin">
<i class="fa-brands fa-google"></i>
Continue With Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
  measurementId: "G-ETHZNFTT7S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click", async () => {

try{

await signInWithPopup(auth, provider);

window.location.href = "home.html";

}catch(error){

alert(error.message);

}

});

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href="home.html";

}

});

</script>

</body>
</html>
