<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Empire</title>

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- ⚡ सुपर फ़ास्ट रीडायरेक्ट: पेज लोड होने की भी प्रतीक्षा नहीं करेगा, अगर लॉगिन है तो तुरंत भेजेगा -->
<script>
  if (localStorage.getItem("isLoggedIn") === "true") {
    window.location.href = "home.html";
  }
</script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  /* प्रीमियम गहरा रॉयल ब्लू ग्रेडिएंट पृष्ठभूमि */
  background: linear-gradient(135deg, #051937, #0d47a1, #1976d2);
}

.login-box {
  width: 90%;
  max-width: 380px;
  background: rgba(255, 255, 255, 0.95);
  padding: 40px 30px;
  border-radius: 24px;
  text-align: center;
  /* हमारे नए लोगो से मैच करता हुआ प्रीमियम गोल्ड और ब्लू शैडो बॉर्डर */
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 0 2px #ffd700;
  position: relative;
}

.logo-container {
  width: 90px;
  height: 90px;
  background: linear-gradient(135deg, #ffd700, #b8860b);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 auto 20px auto;
  box-shadow: 0 8px 16px rgba(13, 71, 161, 0.2);
}

.logo-container i {
  font-size: 45px;
  color: #0d47a1;
}

h1 {
  color: #051937;
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

p {
  color: #555;
  font-size: 15px;
  margin-bottom: 30px;
}

#googleLogin {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #4285F4;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
}

#googleLogin:hover {
  background: #357ae8;
  transform: translateY(-1px);
}

#googleLogin:active {
  transform: translateY(1px);
  box-shadow: 0 2px 6px rgba(66, 133, 244, 0.3);
}
</style>
</head>

<body>

<div class="login-box">

  <!-- नया एम्पायर स्टाइल लोगो कंटेनर -->
  <div class="logo-container">
    <i class="fa-solid fa-graduation-cap"></i>
  </div>

  <h1>Students Empire</h1>
  <p>Empowering Scholars Globally</p>

  <button id="googleLogin">
    <i class="fa-brands fa-google"></i>
    Continue With Google
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
  measurementId: "G-ETHZNFTT7S"
};

// Firebase को शुरू करना
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Firebase स्टेट लिसनर (बैकअप के लिए)
onAuthStateChanged(auth, (user) => {
  if (user) {
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "home.html";
  }
});

// लॉगिन बटन पर क्लिक करने पर Google Popup खोलना
document.getElementById("googleLogin").addEventListener("click", async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    if (result.user) {
      // 1. लोकल मेमोरी में स्टोर करें कि लॉगिन हो चुका है
      localStorage.setItem("isLoggedIn", "true");
      // 2. होम पेज पर भेजें
      window.location.href = "home.html";
    }
  } catch (error) {
    alert("लॉगिन फेल हुआ: " + error.message);
  }
});
</script>

</body>
</html>
