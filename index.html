<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Piter Chats</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eee;}
.app{max-width:420px;margin:auto;background:#fff;height:100vh;display:flex;flex-direction:column;}

header{background:#0f9d58;color:#fff;padding:15px;text-align:center;}

.view{display:none;flex:1;overflow:auto;padding:10px;}
.view.active{display:block;}

.login-btn{
padding:12px 20px;background:#0f9d58;color:#fff;border:none;border-radius:25px;
}

.bottom-nav{
display:flex;justify-content:space-around;background:#fff;
padding:10px;border-top:1px solid #ddd;
}

.bottom-nav button{background:none;border:none;font-size:14px;}
.cat-tab{display:inline-block;padding:6px 12px;margin:5px;background:#eee;border-radius:15px;cursor:pointer;}
.cat-tab.active{background:#0f9d58;color:#fff;}

.note-card{background:#fff;padding:10px;margin:10px 0;border-radius:8px;box-shadow:0 2px 5px #ccc;}
.download-btn{background:#0f9d58;color:#fff;padding:5px 10px;border-radius:5px;text-decoration:none;}
</style>
</head>

<body>

<div class="app">

<header>Piter Chats</header>

<!-- CHAT VIEW -->
<div id="chatView" class="view active">
  <h2>Welcome</h2>
  <button class="login-btn" onclick="googleLogin()">Login With Google</button>
</div>

<!-- NOTES VIEW -->
<div id="notesView" class="view">
  <h3>Notes</h3>
  <div id="categoryContainer"></div>
  <div id="notesContainer"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
<button onclick="switchTab('chat')">Chat</button>
<button onclick="switchTab('notes')">Notes</button>
</div>

</div>

<script>
// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.appspot.com",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ---------------- DATA ----------------
let categories = ["RRB","SSC","Bank","Police"];
let currentCategory = "RRB";

let notesData = [
  {category:"RRB", title:"RRB Syllabus", link:"#"},
  {category:"SSC", title:"SSC Paper", link:"#"},
  {category:"Bank", title:"Bank PDF", link:"#"},
  {category:"Police", title:"Police Notes", link:"#"}
];

// ---------------- LOGIN ----------------
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
  .then(async(result)=>{

    const user = result.user;

    await db.collection("users").doc(user.uid).set({
      uid:user.uid,
      name:user.displayName,
      email:user.email,
      photo:user.photoURL,
      online:true,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});

    alert("Welcome " + user.displayName);
    switchTab("notes");

  })
  .catch(err=>{
    alert(err.message);
    console.log(err);
  });
}

// ---------------- NAV ----------------
function switchTab(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));

  if(tab=="chat"){
    document.getElementById("chatView").classList.add("active");
  }
  if(tab=="notes"){
    document.getElementById("notesView").classList.add("active");
    renderNotes();
  }
}

// ---------------- NOTES ----------------
function renderNotes(){

  // categories
  let catBox = document.getElementById("categoryContainer");
  catBox.innerHTML = "";

  categories.forEach(cat=>{
    let div = document.createElement("div");
    div.className = "cat-tab" + (cat==currentCategory?" active":"");
    div.innerText = cat;

    div.onclick = ()=>{
      currentCategory = cat;
      renderNotes();
    };

    catBox.appendChild(div);
  });

  // notes
  let box = document.getElementById("notesContainer");
  box.innerHTML = "";

  notesData
  .filter(n=>n.category==currentCategory)
  .forEach(n=>{
    box.innerHTML += `
      <div class="note-card">
        <h4>${n.title}</h4>
        <a class="download-btn" href="${n.link}" target="_blank">Open</a>
      </div>
    `;
  });
}

</script>

</body>
</html>
