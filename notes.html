<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notes - Students Empire</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f5f7fb; padding-bottom:80px; }
.header{ background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 10px rgba(0,0,0,.1); }
.tabs{ display:flex; gap:20px; padding:15px; background:white; }
.tabs span{ font-weight:bold; cursor: pointer; color: gray; padding-bottom: 5px; }
.tabs span.active{ color:#0d47a1; border-bottom:3px solid #0d47a1; }
.notes{ padding:15px; }
.note-card{ background:white; padding:15px; border-radius:12px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.08); cursor: pointer; }
.pdf{ font-size:25px; color:#d32f2f; margin-right: 12px; }
.title{ font-weight:bold; font-size:15px; }
.info{ font-size:12px; color:gray; margin-top:4px; }
.bottom-nav{ position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:12px; box-shadow:0 -2px 10px rgba(0,0,0,.15); z-index: 1000; }
.bottom-nav a{ text-decoration:none; color:#333; font-size:13px; text-align:center; }
.bottom-nav a.active { color:#0d47a1; font-weight: bold; }
.bottom-nav i{ display:block; font-size:20px; color:#666; margin-bottom:4px; }
</style>
</head>

<body>

<div class="header">
<h2>College Notes</h2>
<div class="icons"><i class="fa-solid fa-magnifying-glass" id="searchIcon"></i></div>
</div>

<div class="tabs">
    <span class="active" onclick="filterNotes('All', this)">All</span>
    <span onclick="filterNotes('notes', this)">My Notes</span>
    <span onclick="filterNotes('study', this)">Competition</span>
</div>

<div class="notes" id="notesContainer">
  <div style="text-align: center; padding: 20px;">Loading Materials...</div>
</div>

<nav class="bottom-nav">
<a href="home.html"><i class="fa-solid fa-house"></i>Home</a>
<a href="study.html"><i class="fa-solid fa-book"></i>Study</a>
<a href="notes.html" class="active"><i class="fa-solid fa-note-sticky"></i>Notes</a>
<a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE", authDomain: "student-empires.firebaseapp.com", projectId: "student-empires", storageBucket: "student-empires.firebasestorage.app", appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allData = [];

onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "index.html";
    else loadData();
});

function loadData() {
    onSnapshot(collection(db, "materials"), (snap) => {
        allData = [];
        snap.forEach(doc => allData.push(doc.data()));
        render(allData);
    });
}

window.filterNotes = (type, el) => {
    document.querySelectorAll('.tabs span').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    if (type === 'All') render(allData);
    else render(allData.filter(item => item.target === type));
};

function render(data) {
    const cont = document.getElementById("notesContainer");
    cont.innerHTML = data.length ? "" : '<div style="text-align:center; padding:20px;">No notes found!</div>';
    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "note-card";
        div.onclick = () => window.open(item.url, "_blank");
        div.innerHTML = `
            <div class="left" style="display:flex; align-items:center;">
                <i class="fa-solid fa-file-pdf pdf"></i>
                <div>
                    <div class="title">${item.title}</div>
                    <div class="info">Folder: ${item.folder}</div>
                </div>
            </div>`;
        cont.appendChild(div);
    });
}
</script>
</body>
</html>
