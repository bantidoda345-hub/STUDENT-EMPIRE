<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
}

.header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header h2{
font-size:22px;
}

.icons i{
font-size:20px;
margin-left:15px;
}

.tabs{
display:flex;
gap:20px;
padding:15px;
background:white;
}

.tabs span{
font-weight:bold;
}

.active{
color:#0d47a1;
border-bottom:3px solid #0d47a1;
padding-bottom:5px;
}

.notes{
padding:15px;
}

.note-card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.left{
display:flex;
gap:12px;
align-items:center;
}

.pdf{
font-size:25px;
color:red;
}

.title{
font-weight:bold;
font-size:15px;
}

.info{
font-size:12px;
color:gray;
margin-top:4px;
}

.time{
font-size:12px;
color:gray;
}

.add-btn{
position:fixed;
bottom:95px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#0d47a1;
color:white;
font-size:25px;
border:none;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:13px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>
</head>

<body>

<div class="header">
<h2>Notes</h2>

<div class="icons">
<i class="fa-solid fa-magnifying-glass"></i>
<i class="fa-solid fa-filter"></i>
</div>
</div>

<div class="tabs">
<span class="active">All</span>
<span>My Notes</span>
<span>Shared</span>
</div>

<div class="notes">

<div class="note-card">
<div class="left">
<i class="fa-solid fa-file-pdf pdf"></i>
<div>
<div class="title">Class 12 Physics Notes</div>
<div class="info">By You • 2.4 MB</div>
</div>
</div>
<div class="time">Today</div>
</div>

<div class="note-card">
<div class="left">
<i class="fa-solid fa-file-pdf pdf"></i>
<div>
<div class="title">Magnetic Effects Notes</div>
<div class="info">By Aman • 1.2 MB</div>
</div>
</div>
<div class="time">Yesterday</div>
</div>

<div class="note-card">
<div class="left">
<i class="fa-solid fa-file-pdf pdf"></i>
<div>
<div class="title">Thermodynamics Notes</div>
<div class="info">By Neha • 1.8 MB</div>
</div>
</div>
<div class="time">2 Days Ago</div>
</div>

<div class="note-card">
<div class="left">
<i class="fa-solid fa-file-pdf pdf"></i>
<div>
<div class="title">Chemistry Organic Notes</div>
<div class="info">By You • 2.1 MB</div>
</div>
</div>
<div class="time">3 Days Ago</div>
</div>

</div>

<button class="add-btn">+</button>

<nav class="bottom-nav">

<a href="index.html">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="study.html">
<i class="fa-solid fa-book"></i>
Study
</a>

<a href="chat.html">
<i class="fa-solid fa-comments"></i>
Chat
</a>

<a href="community.html">
<i class="fa-solid fa-users"></i>
Community
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>

</nav>

</body>
</html>
