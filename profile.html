<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - Private Chat</title>
<style>
/* ===== BASIC STYLES ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

/* ===== BACKGROUND ===== */
.bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #dcf8c6 0%, #efe7dd 100%); z-index: -1; }

/* ===== MAIN CONTAINER ===== */
.container { max-width: 600px; margin: 0 auto; padding: 30px 20px; }
.back-link { display: inline-flex; align-items: center; gap: 8px; color: #075e54; font-size: 15px; margin-bottom: 25px; }
.back-link:hover { text-decoration: underline; }

/* ===== PROFILE CARD ===== */
.profile-card { background: white; border-radius: 8px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); overflow: hidden; }
.card-header { background: linear-gradient(135deg, #128c7e, #25d366); padding: 30px; text-align: center; }
.card-header h1 { color: white; font-size: 24px; margin-bottom: 5px; }
.card-header p { color: rgba(255,255,255,0.85); font-size: 14px; }

/* ===== PROFILE PICTURE ===== */
.profile-pic-section { display: flex; flex-direction: column; align-items: center; margin-top: -60px; }
.profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
.profile-pic img { width: 100%; height: 100%; object-fit: cover; }
.profile-pic .placeholder { font-size: 50px; color: #ccc; }
.profile-pic input { display: none; }
.camera-icon { position: absolute; bottom: 5px; right: 5px; width: 36px; height: 36px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; border: 3px solid white; }
.change-photo-text { color: #128c7e; font-size: 14px; font-weight: 600; margin-top: 12px; cursor: pointer; }

/* ===== FORM SECTIONS ===== */
.form-section { padding: 25px; }
.section-title { font-size: 12px; color: #667781; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; }

.input-group { margin-bottom: 20px; }
.input-group label { display: block; color: #1a1a1a; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.input-group input, 
.input-group textarea { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 15px; outline: none; transition: 0.2s; background: #fcfcfc; }
.input-group input:focus, 
.input-group textarea:focus { border-color: #25d366; background: white; box-shadow: 0 0 0 3px rgba(37,211,102,0.15); }
.input-group textarea { resize: none; height: 100px; }
.input-group .hint { font-size: 12px; color: #999; margin-top: 6px; }

/* ===== LAST SEEN TOGGLE ===== */
.toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f1f1; }
.toggle-info h3 { font-size: 15px; color: #1a1a1a; margin-bottom: 3px; }
.toggle-info p { font-size: 13px; color: #667781; }
.toggle-switch { width: 52px; height: 28px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
.toggle-switch.active { background: #25d366; }
.toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.toggle-switch.active::after { left: 27px; }

/* ===== SAVE BUTTON ===== */
.save-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #25d366, #128c7e); color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
.save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(37,211,102,0.4); }

/* ===== LOGOUT BUTTON ===== */
.logout-section { padding: 0 25px 25px; }
.logout-btn { width: 100%; padding: 16px; background: #fff5f5; color: #dc3545; border: 1px solid #ffcccc; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.logout-btn:hover { background: #ffebeb; border-color: #ff9999; }

/* ===== TOAST ===== */
.toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; color: white; padding: 14px 25px; border-radius: 4px; font-size: 14px; z-index: 2000; opacity: 0; transition: 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: #25d366; }
.toast.error { background: #dc3545; }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
.container { padding: 20px 15px; }
.profile-pic { width: 100px; height: 100px; }
.card-header { padding: 25px; }
.form-section { padding: 20px; }
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
<a href="index.html" class="back-link">← Back to Chat</a>

<div class="profile-card">
<div class="card-header">
<h1>My Profile</h1>
<p>Manage your account settings</p>
</div>

<div class="profile-pic-section">
<div class="profile-pic" onclick="document.getElementById('dpInput').click()">
<img id="dpPreview" src="" class="placeholder">
<span class="placeholder">👤</span>
<input type="file" id="dpInput" accept="image/*" onchange="previewImage(this)">
<div class="camera-icon">📷</div>
</div>
<label class="change-photo-text" onclick="document.getElementById('dpInput').click()">Change Photo</label>
</div>

<div class="form-section">
<div class="section-title">Account Info</div>

<div class="input-group">
<label>Username *</label>
<input type="text" id="username" placeholder="Enter your username" required>
</div>

<div class="input-group">
<label>Phone Number *</label>
<input type="tel" id="phone" placeholder="+91xxxxxxxxxx" required>
</div>

<div class="input-group">
<label>About / Bio</label>
<textarea id="bio" placeholder="Write something about yourself..." maxlength="150"></textarea>
<p class="hint">Max 150 characters</p>
</div>

<div class="section-title">Privacy Settings</div>

<div class="toggle-group">
<div class="toggle-info">
<h3>Last Seen</h3>
<p>Show when you were last online</p>
</div>
<div class="toggle-switch" id="lastSeenToggle" onclick="toggleLastSeen()"></div>
</div>

<button class="save-btn" onclick="saveProfile()">Save Profile</button>
</div>

<div class="logout-section">
<button class="logout-btn" onclick="logout()">
<span>🚪</span> Logout
</button>
</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== LOAD PROFILE DATA =====
window.onload = function() {
loadProfile();
};

// Preview Profile Picture
function previewImage(input) {
if (input.files && input.files[0]) {
var reader = new FileReader();
reader.onload = function(e) {
document.getElementById('dpPreview').src = e.target.result;
document.querySelector('.placeholder').style.display = 'none';
};
reader.readAsDataURL(input.files[0]);
}
}

// Toggle Last Seen
let lastSeenEnabled = false;
function toggleLastSeen() {
lastSeenEnabled = !lastSeenEnabled;
document.getElementById('lastSeenToggle').classList.toggle('active', lastSeenEnabled);
}

// Save Profile
function saveProfile() {
const username = document.getElementById('username').value.trim();
const phone = document.getElementById('phone').value.trim();
const bio = document.getElementById('bio').value.trim();
const dpPreview = document.getElementById('dpPreview').src;

if (!username) {
showToast('Please enter username', 'error');
return;
}
if (!phone) {
showToast('Please enter phone number', 'error');
return;
}

// Save to localStorage
const profile = {
username: username,
phone: phone,
bio: bio,
dp: dpPreview,
lastSeen: lastSeenEnabled,
createdAt: new Date().toISOString()
};

localStorage.setItem('chatProfile', JSON.stringify(profile));
showToast('Profile saved successfully!', 'success');

// Redirect to chat after 1.5 seconds
setTimeout(function() {
window.location.href = 'index.html';
}, 1500);
}

// Load Profile
function loadProfile() {
const savedProfile = localStorage.getItem('chatProfile');
if (savedProfile) {
const profile = JSON.parse(savedProfile);
document.getElementById('username').value = profile.username || '';
document.getElementById('phone').value = profile.phone || '';
document.getElementById('bio').value = profile.bio || '';
document.getElementById('dpPreview').src = profile.dp || '';
document.querySelector('.placeholder').style.display = profile.dp ? 'none' : 'flex';

if (profile.lastSeen) {
lastSeenEnabled = true;
document.getElementById('lastSeenToggle').classList.add('active');
}
}
}

// Logout
function logout() {
if (confirm('Are you sure you want to logout?')) {
localStorage.removeItem('chatProfile');
showToast('Logged out successfully!', 'success');
setTimeout(function() {
window.location.href = 'index.html';
}, 1000);
}
}

// Toast Message
function showToast(message, type) {
const toast = document.getElementById('toast');
toast.textContent = message;
toast.className = 'toast show ' + type;
setTimeout(function() {
toast.className = 'toast';
}, 3000);
}
</script>

</body>
</html>
