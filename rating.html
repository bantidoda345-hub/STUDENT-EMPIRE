<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rate Us - Students Empire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7fe; padding: 20px; text-align: center; }
        .rating-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stars { font-size: 30px; color: #ffc107; margin: 20px 0; cursor: pointer; }
        button { background: #0d47a1; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="rating-box">
        <h3>Rate Students Empire</h3>
        <div class="stars" id="starContainer">
            <i class="fa-regular fa-star" data-value="1"></i>
            <i class="fa-regular fa-star" data-value="2"></i>
            <i class="fa-regular fa-star" data-value="3"></i>
            <i class="fa-regular fa-star" data-value="4"></i>
            <i class="fa-regular fa-star" data-value="5"></i>
        </div>
        <button onclick="submitRating()">Submit Rating</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* Apna Config Yahan Bhi Dalna */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedRating = 0;
        document.querySelectorAll('.stars i').forEach(star => {
            star.onclick = () => {
                selectedRating = star.getAttribute('data-value');
                document.querySelectorAll('.stars i').forEach((s, i) => {
                    s.className = i < selectedRating ? 'fa-solid fa-star' : 'fa-regular fa-star';
                });
            }
        });

        window.submitRating = async () => {
            const user = auth.currentUser;
            if(!user) return alert("Login karo pehle!");
            if(selectedRating == 0) return alert("Star chuno!");
            
            await addDoc(collection(db, "ratings"), {
                name: user.displayName || "Student",
                rating: selectedRating,
                timestamp: serverTimestamp()
            });
            alert("Thanks for your rating!");
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
