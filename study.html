<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Competition Study - Students Empire</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f5f7fb; padding-bottom:80px; }
.header{ background:#0d47a1; color:white; padding:15px; display: flex; align-items: center; justify-content: space-between; }
.header h2{ font-size:24px; }
.back-btn { background: rgba(255, 255, 255, 0.2); color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: none; }
.search-box{ padding:15px; }
.search-box input{ width:100%; padding:12px; border:none; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); outline: none; }
.grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:15px; padding:15px; }
.card{ background:white; padding:20px; border-radius:15px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.1); cursor: pointer; border: 1px solid #e3f2fd; }
.card:active { transform: scale(0.95); }
.card i{ font-size:35px; color:#e65100; margin-bottom:10px; }
.card h3{ font-size:15px; font-weight: bold; color: #333; }
.section-title { padding: 0 15px; font-size: 16px; font-weight: bold; color: #e65100; margin-top: 10px; }
.materials{ padding:15px; display: none; }
.material{ background:white; padding:15px; margin-bottom:10px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.1); display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #e65100; }
.btn{ background:#e65100; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
.bottom-nav{ position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:12px; box-shadow:0 -2px 10px rgba(0,0,0,.15); z-index: 1000; }
.bottom-nav a{ text-decoration:none; color:#333; font-size:14px; text-align:center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bottom-nav a.active { color: #e65100; font-weight: bold; }
.bottom-nav i{ display:block; font-size:20px; color:#666; }
.bottom-nav a.active i { color:#e65100; }
</style>
</head>
<body>

<div class="header">
<h2>Competition Study</h2>
<button class="back-btn" id="backBtn" onclick="resetFilter()"><i class="fa-solid fa-arrow-left"></i> Back</button>
</div>

<div class="search-box" id="searchBoxContainer">
<input type="text" id="searchInput" placeholder="Search Materials...">
</div>

<div class="section-title" id="folderTitle"><i class="fa-solid fa-layer-group"></i> Study Categories</div>
<div class="grid" id="foldersGrid"></div>

<div class="section-title" id="pdfTitle" style="display: none;"><i class="fa-solid fa-file-pdf"></i> Available Materials</div>
<div class="materials" id="materialsContainer"></div>

<nav class="bottom-nav">
<a href="home.html"><i class="fa-solid fa-house"></i>Home</a>
<a href="study.html" class="active"><i class="fa-solid fa-book"></i>Study</a>
<a href="chat.html"><i class="fa-solid fa-comments"></i>Chat</a>
<a href="community.html"><i class="fa-solid fa-users"></i>Community</a>
<a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE", authDomain: "student-empires.firebaseapp.com", projectId: "student-empires", storageBucket: "student-empires.firebasestorage.app", appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Sahi Supabase Initialization
const supabase = window.supabase.createClient('https://ffnkqmqqspryqskattut.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbmtxbXFxc3ByeXFza2F0dHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDMwODEsImV4cCI6MjA5ODIxOTA4MX0.EXtgfJRX0EQM6YFdRp85hhf6QEnCnGClgSlb5INH1n4');

let allMaterials = [];

onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "index.html";
    else { loadFolders(); fetchFromSupabase(); }
});

function loadFolders() {
    onSnapshot(query(collection(db, "folders"), where("type", "==", "study")), (snap) => {
        const grid = document.getElementById("foldersGrid");
        grid.innerHTML = "";
        snap.forEach(doc => {
            const f = doc.data();
            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => window.selectFolder(f.name);
            card.innerHTML = '<i class="fa-solid fa-folder-open"></i><h3>'+f.name+'</h3>';
            grid.appendChild(card);
        });
    });
}

async function fetchFromSupabase() {
    const { data, error } = await supabase.from('materials').select('*').eq('target', 'study');
    if(!error) allMaterials = data;
}

window.renderMaterials = (dataList) => {
    const cont = document.getElementById("materialsContainer");
    cont.innerHTML = dataList.length ? "" : '<div style="text-align:center; padding:20px;">No material found!</div>';
    dataList.forEach(item => {
        const div = document.createElement("div");
        div.className = "material";
        div.innerHTML = `<div><b>${item.title}</b></div>
                         <button class="btn" onclick="window.open('${item.url}', '_blank')">Open</button>`;
        cont.appendChild(div);
    });
};

window.selectFolder = (name) => {
    document.getElementById("foldersGrid").style.display = "none";
    document.getElementById("folderTitle").style.display = "none";
    document.getElementById("materialsContainer").style.display = "block";
    document.getElementById("pdfTitle").style.display = "block";
    document.getElementById("backBtn").style.display = "block";
    renderMaterials(allMaterials.filter(i => i.folder === name));
};

window.resetFilter = () => {
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("materialsContainer").style.display = "none";
    document.getElementById("pdfTitle").style.display = "none";
    document.getElementById("foldersGrid").style.display = "grid";
    document.getElementById("folderTitle").style.display = "block";
};

document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    if(term === "") resetFilter();
    else {
        document.getElementById("foldersGrid").style.display = "none";
        document.getElementById("materialsContainer").style.display = "block";
        renderMaterials(allMaterials.filter(i => i.title.toLowerCase().includes(term)));
    }
});
</script>
</body>
</html>
