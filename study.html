<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Study Material - Students Empire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f5f7fb; padding-bottom:80px; }
.header{ background:#0d47a1; color:white; padding:15px; display: flex; align-items: center; justify-content: space-between; }
.header h2{ font-size:24px; }
.back-btn { background: rgba(255, 255, 255, 0.2); color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: none; }
.search-box{ padding:15px; }
.search-box input{ width:100%; padding:12px; border:none; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); outline: none; }
.grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:15px; padding:15px; }
.card{ background:white; padding:20px; border-radius:15px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.1); text-decoration:none; color:black; cursor: pointer; transition: transform 0.2s; border: 1px solid transparent; }
.card:active { transform: scale(0.95); }
.card i{ font-size:35px; color:#0d47a1; margin-bottom:10px; }
.card h3{ font-size:15px; font-weight: bold; color: #333; }
.section-title { padding: 0 15px; font-size: 16px; font-weight: bold; color: #0d47a1; margin-top: 10px; }
.materials{ padding:15px; display: none; }
.material{ background:white; padding:15px; margin-bottom:10px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.1); display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #1976d2; }
.btn{ background:#0d47a1; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
.bottom-nav{ position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:12px; box-shadow:0 -2px 10px rgba(0,0,0,.15); z-index: 1000; }
.bottom-nav a{ text-decoration:none; color:#333; font-size:14px; text-align:center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bottom-nav a.active { color: #0d47a1; font-weight: bold; }
.bottom-nav i{ display:block; font-size:20px; color:#666; }
.bottom-nav a.active i { color:#0d47a1; }
</style>
</head>

<body>

<div class="header">
<h2>Study Material</h2>
<button class="back-btn" id="backBtn" onclick="window.resetFilter()"><i class="fa-solid fa-arrow-left"></i> Back</button>
</div>

<div class="search-box" id="searchBoxContainer">
<input type="text" id="searchInput" placeholder="Search Books, Exam or Subjects...">
</div>

<div class="section-title" id="folderTitle"><i class="fa-solid fa-layer-group"></i> Exam Categories</div>
<div class="grid" id="foldersGrid"></div>

<div class="section-title" id="pdfTitle" style="display: none;"><i class="fa-solid fa-file-pdf"></i> Available PDFs</div>
<div class="materials" id="materialsContainer"></div>

<nav class="bottom-nav">
<a href="home.html"><i class="fa-solid fa-house"></i>Home</a>
<a href="study.html" class="active"><i class="fa-solid fa-book"></i>Study</a>
<a href="chat.html"><i class="fa-solid fa-comments"></i>Chat</a>
<a href="community.html"><i class="fa-solid fa-users"></i>Community</a>
<a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
  measurementId: "G-ETHZNFTT7S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allMaterials = []; 

onAuthStateChanged(auth, function(user) {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadFolders();
    loadMaterials();
  }
});

function loadFolders() {
  onSnapshot(collection(db, "folders"), function(snapshot) {
    const grid = document.getElementById("foldersGrid");
    grid.innerHTML = "";
    snapshot.forEach(function(doc) {
      const folder = doc.data();
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = function() {
        window.selectFolder(folder.name);
      };
      card.innerHTML = '<i class="fa-solid fa-folder-open"></i><h3>' + folder.name + '</h3>';
      grid.appendChild(card);
    });
  });
}

function loadMaterials() {
  onSnapshot(collection(db, "materials"), function(snapshot) {
    allMaterials = []; 
    snapshot.forEach(function(doc) {
      const data = doc.data();
      allMaterials.push({ title: data.title, folder: data.folder, url: data.url || data.link });
    });
  });
}

window.secureOpenPdf = function(pdfUrl) {
  if(!pdfUrl) return;
  var finalUrl = pdfUrl;
  
  // Clean string split solution that compiler will easily accept
  if (finalUrl.indexOf("drive.google.com") !== -1) {
      var parts = finalUrl.split("/view");
      if (parts.length > 0) {
          finalUrl = parts[0] + "/preview";
      }
  }
  
  window.open(finalUrl, "_blank");
};

function renderMaterials(dataList) {
  const container = document.getElementById("materialsContainer");
  container.innerHTML = "";
  if(dataList.length === 0) { 
    container.innerHTML = '<div style="text-align:center; padding:20px;">No notes found!</div>'; 
    return; 
  }
  dataList.forEach(function(item) {
    const div = document.createElement("div");
    div.className = "material";
    
    const infoDiv = document.createElement("div");
    infoDiv.innerHTML = "<b>" + item.title + "</b><br><small>" + item.folder + "</small>";
    
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = "Open";
    btn.onclick = function() {
        window.secureOpenPdf(item.url);
    };
    
    div.appendChild(infoDiv);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

window.selectFolder = function(folderName) {
  document.getElementById("foldersGrid").style.display = "none";
  document.getElementById("folderTitle").style.display = "none";
  document.getElementById("searchBoxContainer").style.display = "none";
  document.getElementById("materialsContainer").style.display = "block";
  document.getElementById("pdfTitle").style.display = "block";
  document.getElementById("backBtn").style.display = "block";
  renderMaterials(allMaterials.filter(function(item) {
    return item.folder.toLowerCase() === folderName.toLowerCase();
  }));
};

window.resetFilter = function() {
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("materialsContainer").style.display = "none";
  document.getElementById("pdfTitle").style.display = "none";
  document.getElementById("foldersGrid").style.display = "grid";
  document.getElementById("folderTitle").style.display = "block";
  document.getElementById("searchBoxContainer").style.display = "block";
};

document.getElementById("searchInput").addEventListener("input", function(e) {
  const term = e.target.value.toLowerCase();
  if(term.trim() === "") {
      window.resetFilter();
  } else {
      document.getElementById("foldersGrid").style.display = "none";
      document.getElementById("folderTitle").style.display = "none";
      document.getElementById("materialsContainer").style.display = "block";
      document.getElementById("pdfTitle").style.display = "block";
      const filtered = allMaterials.filter(function(item) {
         return item.title.toLowerCase().includes(term) || item.folder.toLowerCase().includes(term);
      });
      renderMaterials(filtered);
  }
});
</script>
</body>
</html>
