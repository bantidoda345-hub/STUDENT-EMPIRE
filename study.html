<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Study Material</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:80px;
}

.header{
background:#0d47a1;
color:white;
padding:15px;
}

.header h2{
font-size:24px;
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
outline: none;
}

/* फ़ोल्डर्स ग्रिड स्टाइल */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-decoration:none;
color:black;
cursor: pointer;
transition: transform 0.2s;
}

.card:active {
transform: scale(0.95);
}

.card i{
font-size:35px;
color:#0d47a1;
margin-bottom:10px;
}

.card h3{
font-size:16px;
}

.materials{
padding:15px;
}

.material{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.btn{
background:#0d47a1;
color:white;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
font-weight: bold;
}

.btn:active {
opacity: 0.9;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
z-index: 1000;
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:14px;
text-align:center;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:4px;
color:#0d47a1;
}
</style>
</head>

<body>

<div class="header">
<h2>Study Material</h2>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search Study Material/Folders...">
</div>

<div class="grid" id="foldersGrid">
  <div style="grid-column: span 2; text-align: center; color: #666;">Loading Folders...</div>
</div>

<div class="materials" id="materialsContainer">
  <div style="text-align: center; color: #666;">Loading PDFs...</div>
</div>

<nav class="bottom-nav">
<a href="home.html">
<i class="fa-solid fa-house"></i>
Home
</a>
<a href="study.html">
<i class="fa-solid fa-book"></i>
Study
</a>
<a href="chat.html">
<i class="fa-solid fa-comments"></i>
Chat
</a>
<a href="community.html">
<i class="fa-solid fa-users"></i>
Community
</a>
<a href="profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
  authDomain: "student-empires.firebaseapp.com",
  projectId: "student-empires",
  storageBucket: "student-empires.firebasestorage.app",
  messagingSenderId: "509106125707",
  appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
  measurementId: "G-ETHZNFTT7S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allMaterials = []; // सर्च फ़िल्टर के लिए सारे मैटेरियल्स स्टोर करेंगे

// सुरक्षा लॉक 
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadFolders();
    loadMaterials();
  }
});

// 1. डेटाबेस से लाइव फ़ोल्डर्स लोड करना
function loadFolders() {
  onSnapshot(collection(db, "folders"), (snapshot) => {
    const grid = document.getElementById("foldersGrid");
    grid.innerHTML = "";

    if(snapshot.empty) {
      grid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: #666;">No Folders Available</div>';
      return;
    }

    snapshot.forEach(doc => {
      const folder = doc.data();
      
      // फ़ोल्डर कार्ड को डायनामिक बनाना
      const card = document.createElement("div");
      card.className = "card";
      // क्लिक करने पर सीधे उस फ़ोल्डर के नोट्स पर फ़िल्टर लगा सकते हैं
      card.onclick = () => {
        document.getElementById("searchInput").value = folder.name;
        filterData();
      };

      card.innerHTML = `
        <i class="fa-solid fa-folder-open"></i>
        <h3>${folder.name}</h3>
      `;
      grid.appendChild(card);
    });
  });
}

// 2. डेटाबेस से लाइव PDF मैटेरियल्स लोड करना
function loadMaterials() {
  onSnapshot(collection(db, "materials"), (snapshot) => {
    allMaterials = []; // ऐरे रीसेट करें
    snapshot.forEach(doc => {
      allMaterials.push(doc.data());
    });
    renderMaterials(allMaterials); // स्क्रीन पर दिखाएँ
  });
}

// स्क्रीन पर लिस्ट रेंडर करने का फंक्शन
function renderMaterials(dataList) {
  const container = document.getElementById("materialsContainer");
  container.innerHTML = "";

  if(dataList.length === 0) {
    container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">कोई नोट्स नहीं मिले!</div>';
    return;
  }

  dataList.forEach(item => {
    const materialDiv = document.createElement("div");
    materialDiv.className = "material";
    materialDiv.innerHTML = `
      <div>
        <span style="font-weight: bold; display: block;">${item.title}</span>
        <span style="font-size: 12px; color: #666;"><i class="fa-solid fa-tag"></i> ${item.folder}</span>
      </div>
      <a href="${item.url}" target="_blank" class="btn">Open</a>
    `;
    container.appendChild(materialDiv);
  });
}

// 3. लाइव सर्च फ़िल्टर फंक्शन
function filterData() {
  const searchText = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allMaterials.filter(item => {
    return item.title.toLowerCase().includes(searchText) || item.folder.toLowerCase().includes(searchText);
  });
  renderMaterials(filtered);
}

// सर्च बॉक्स में टाइप करते ही सर्च चालू हो जाएगी
document.getElementById("searchInput").addEventListener("input", filterData);
</script>

</body>
</html>
