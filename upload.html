<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dashboard - Students Empire</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        .box { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; margin: auto; }
        h3 { margin-top: 0; color: #0d47a1; font-size: 22px; text-align: center; margin-bottom: 20px; }
        
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-top: 12px; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 12px; margin: 6px 0 16px 0; border: 1px solid #ccd1d9; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        input[type="text"]:focus, select:focus { border-color: #0d47a1; outline: none; background: #fff; }
        
        .radio-group { display: flex; gap: 20px; margin: 8px 0 20px 0; }
        .radio-option { display: flex; align-items: center; gap: 6px; font-size: 15px; cursor: pointer; }
        .radio-option input { cursor: pointer; margin: 0; }

        button { width: 100%; padding: 14px; background: #0d47a1; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0a3981; }
        #msg { color: #0d47a1; font-weight: bold; text-align: center; margin-top: 15px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Admin Upload Panel</h3>
        
        <label>Kahan upload karna hai?</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="sectionType" value="study_material" checked> Study Material HTML
            </label>
            <label class="radio-option">
                <input type="radio" name="sectionType" value="notes"> Notes HTML
            </label>
        </div>

        <label for="title">PDF ka Naam (Title)</label>
        <input type="text" id="title" placeholder="Ex: History Chapter 1, Math Formula Sheet">

        <label for="folder">Folder Select Karein</label>
        <select id="folder">
            <option value="" disabled selected>-- Folder Chunein --</option>
            <option value="RRB NTPC">RRB NTPC</option>
            <option value="BA 2nd Sem">BA 2nd Sem</option>
            <option value="General Knowledge">General Knowledge</option>
            <option value="Current Affairs">Current Affairs</option>
        </select>

        <label for="fileInput">PDF File Attach Karein</label>
        <input type="file" id="fileInput" accept="application/pdf">

        <button id="uploadBtn">Upload to Firebase</button>
        
        <p id="msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Aapki Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBL9NlJqnueA_-5a78H9pwWpjMkWenq7YE",
            authDomain: "student-empires.firebaseapp.com",
            projectId: "student-empires",
            storageBucket: "student-empires.firebasestorage.app",
            messagingSenderId: "509106125707",
            appId: "1:509106125707:web:9b79f87b9a9f0fa71b8d8e",
            measurementId: "G-ETHZNFTT7S"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        document.getElementById('uploadBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            const title = document.getElementById('title').value.trim();
            const folder = document.getElementById('folder').value;
            const sectionType = document.querySelector('input[name="sectionType"]:checked').value;
            const msg = document.getElementById('msg');

            // Validation Check
            if(!file || !title || !folder) {
                return alert("Kripya saari details bharein aur folder select karein!");
            }

            msg.innerText = "⏳ File upload ho rahi hai... please wait...";
            msg.style.color = "#0d47a1";

            try {
                // 1. Storage Reference: Alag folder paths storage mein organize karne ke liye
                const storagePath = `pdfs/${sectionType}/${folder}/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, storagePath);
                
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);

                // 2. Firestore Collection: Isse aap study_material aur notes ko alag-alag fetch kar sakenge
                await addDoc(collection(db, sectionType), {
                    title: title,
                    folder: folder,
                    url: url,
                    uploadedAt: new Date()
                });

                msg.innerText = "✅ Done! File sahi section mein upload ho gayi.";
                msg.style.color = "green";
                
                // Form Reset
                document.getElementById('title').value = "";
                document.getElementById('fileInput').value = "";
                document.getElementById('folder').selectedIndex = 0;
                
                alert("Upload Success!");
            } catch (error) {
                msg.innerText = "❌ Error: " + error.message;
                msg.style.color = "red";
                console.error(error);
            }
        }
    </script>
</body>
</html>
