<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Material</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f4f6f9; }
        iframe { flex-grow: 1; width: 100%; border: none; }
        .header { background: #0d47a1; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
    </style>
</head>
<body>
    <div class="header" id="fileName">Loading PDF...</div>
    <iframe id="pdfFrame" src=""></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title');

        if(pdfUrl) {
            document.getElementById('fileName').innerText = title || "Study Material";

            // Method: Google Docs Viewer ka use karein jo Firebase secure tokens ko bhi aaram se load kar deta hai
            const viewerUrl = "https://docs.google.com/gview?embedded=true&url=" + encodeURIComponent(pdfUrl);
            
            document.getElementById('pdfFrame').src = viewerUrl;
        } else {
            document.body.innerHTML = "<h3 style='text-align:center; margin-top:20px; color: red;'>File not found!</h3>";
        }
    </script>
</body>
</html>
