<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Material</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        iframe { flex-grow: 1; width: 100%; border: none; }
        .header { background: #0d47a1; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="header" id="fileName">Loading PDF...</div>
    <iframe id="pdfFrame" src=""></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title');

        if(pdfUrl) {
            document.getElementById('fileName').innerText = title || "Study Material";
            
            // 403 Error से बचने के लिए Mozilla PDF.js का उपयोग करें
            // यह तरीका Google Drive की फाइलों को सीधे रेंडर कर देता है
            const viewerUrl = "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + encodeURIComponent(pdfUrl);
            document.getElementById('pdfFrame').src = viewerUrl;
        } else {
            document.body.innerHTML = "<h3 style='text-align:center; margin-top:20px;'>File not found!</h3>";
        }
    </script>
</body>
</html>
